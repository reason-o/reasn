<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REASN으로 초대합니다.</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 🖤 메인 페이지 모던 블랙앤화이트 테마 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; color: #111; }
        .login-container { background: white; padding: 50px 40px; border: 1px solid #e1e1e1; width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #111; margin-bottom: 35px; font-size: 32px; font-weight: bold; letter-spacing: 1px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #e1e1e1; font-size: 14px; background-color: #fff; color: #111; }
        input:focus { outline: 1px solid #111; }
        button { width: 100%; padding: 14px; background-color: #111; color: white; border: none; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 15px; letter-spacing: 1px; transition: background 0.2s; }
        button:hover { background-color: #333; }
        .toggle-link { color: #666; font-size: 13px; cursor: pointer; text-decoration: underline; transition: color 0.2s; }
        .toggle-link:hover { color: #111; }
    </style>
</head>
<body>

    <div class="login-container">
        <h1 id="title">reasn</h1>
        
        <input type="email" id="email" placeholder="이메일 주소">
        <input type="text" id="nickname" placeholder="게시판에서 사용할 닉네임" style="display: none;">
        <input type="password" id="password" placeholder="비밀번호">
        
        <button id="mainBtn" onclick="handleAuth()">입장하기</button>
        <div id="toggleAuth" class="toggle-link" onclick="toggleMode()">신규 회원가입하러 가기</div>
    </div>

    <script>
        const SUPABASE_URL = "https://jfsaccbtbvuglvlgagus.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_XU8l4rpJsFPlaHj3cny84Q_v53odH1k"; 
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isSignUpMode = false;

        function toggleMode() {
            isSignUpMode = !isSignUpMode;
            const title = document.getElementById('title');
            const nicknameInput = document.getElementById('nickname');
            const mainBtn = document.getElementById('mainBtn');
            const toggleLink = document.getElementById('toggleAuth');

            if (isSignUpMode) {
                title.innerText = "sign up";
                nicknameInput.style.display = "block";
                mainBtn.innerText = "가입 완료하기";
                toggleLink.innerText = "이미 계정이 있으신가요? 로그인하기";
            } else {
                title.innerText = "reasn";
                nicknameInput.style.display = "none";
                mainBtn.innerText = "입장하기";
                toggleLink.innerText = "신규 회원가입하러 가기";
            }
        }

        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const nickname = document.getElementById('nickname').value.trim();

            if (!email || !password) {
                return alert('이메일과 비밀번호를 모두 입력해주세요!');
            }

            if (isSignUpMode) {
                if (!nickname) return alert('닉네임을 적어주세요!');
                
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: { data: { display_name: nickname, role: 'USER' } }
                });

                if (error) alert('회원가입 실패: ' + error.message);
                else {
                    alert('가입 완료! 가입하신 정보로 로그인해 주세요.');
                    toggleMode();
                }
            } else {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email: email, password: password });

                if (error) alert('로그인 실패: ' + error.message);
                else {
                    const user = data.user;
                    localStorage.setItem('reasn_user_name', user.user_metadata.display_name);
                    localStorage.setItem('reasn_user_role', user.user_metadata.role);
                    window.location.href = 'board.html';
                }
            }
        }
    </script>
</body>
</html>
