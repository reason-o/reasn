<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reasn - 익명 커뮤니티</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 🖤 블랙 앤 화이트 테마 스타일링 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background-color: #fafafa; color: #111; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background-color: #111; color: #fff; padding: 20px; text-align: center; font-weight: bold; font-size: 20px; position: relative; letter-spacing: 1px; }
        .user-info { position: absolute; right: 20px; top: 22px; font-size: 13px; font-weight: normal; color: #ccc; }
        .logout-btn { background: none; border: 1px solid #555; color: #ccc; padding: 3px 8px; margin-left: 10px; border-radius: 3px; cursor: pointer; font-size: 11px; transition: all 0.2s; }
        .logout-btn:hover { background-color: #fff; color: #111; border-color: #fff; }
        
        .container { display: flex; flex: 1; max-width: 800px; width: 100%; margin: 0 auto; padding: 20px 10px; flex-direction: column; }
        
        /* 카테고리 탭 스타일 */
        .category-tabs { display: flex; border-bottom: 2px solid #111; margin-bottom: 20px; }
        .category-btn { flex: 1; padding: 15px; background: none; border: none; font-size: 15px; font-weight: bold; color: #888; cursor: pointer; text-align: center; transition: all 0.2s; }
        .category-btn:hover, .category-btn.active { color: #111; }
        .category-btn.active { border-bottom: 4px solid #111; margin-bottom: -2px; }

        /* 글쓰기 영역 */
        .write-section { background: #fff; padding: 20px; border: 1px solid #e1e1e1; border-radius: 0px; margin-bottom: 30px; }
        textarea { width: 100%; height: 90px; padding: 12px; border: 1px solid #e1e1e1; border-radius: 0px; resize: none; margin-bottom: 10px; font-size: 14px; }
        textarea:focus { outline: 1px solid #111; }
        .submit-btn { width: 100%; padding: 14px; background-color: #111; color: #fff; border: none; cursor: pointer; font-size: 15px; font-weight: bold; letter-spacing: 1px; transition: background 0.2s; }
        .submit-btn:hover { background-color: #333; }
        
        /* 게시글 카드 */
        .post { background: #fff; padding: 20px; margin-top: 20px; border: 1px solid #e1e1e1; position: relative; }
        .post-author { font-weight: bold; color: #111; margin-bottom: 8px; font-size: 14px; display: flex; align-items: center; }
        .author-badge { display: inline-block; padding: 2px 6px; font-size: 10px; margin-left: 8px; font-weight: bold; letter-spacing: 0.5px; }
        .badge-user { background-color: #f0f0f0; color: #555; }
        .badge-vip { background-color: #111; color: #fff; }
        .badge-admin { background-color: #ff3b30; color: #fff; }
        
        .post-content { font-size: 15px; line-height: 1.6; color: #222; margin-bottom: 12px; white-space: pre-wrap; }
        .post-time { font-size: 11px; color: #aaa; margin-bottom: 15px; }
        
        /* 💬 댓글 영역 스타일 */
        .comment-section { border-top: 1px dashed #e1e1e1; padding-top: 15px; margin-top: 15px; background: #fafafa; margin: 15px -20px -20px -20px; padding: 15px 20px; }
        .comment-list { margin-bottom: 15px; }
        .comment-item { font-size: 13px; margin-bottom: 8px; line-height: 1.4; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
        .comment-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .comment-author { font-weight: bold; color: #111; margin-right: 6px; }
        .comment-badge { font-size: 9px; padding: 1px 4px; margin-right: 6px; background: #eee; }
        
        .comment-input-box { display: flex; gap: 8px; margin-top: 10px; }
        .comment-input { flex: 1; padding: 8px 12px; border: 1px solid #e1e1e1; font-size: 13px; }
        .comment-input:focus { outline: 1px solid #111; }
        .comment-btn { padding: 8px 15px; background: #111; color: #fff; border: none; font-size: 13px; font-weight: bold; cursor: pointer; }
        .comment-btn:hover { background-color: #333; }
    </style>
</head>
<body>

    <header>
        🤫 reasn
        <div class="user-info" id="userInfo">
            <span id="userText">로딩 중...</span>
            <button class="logout-btn" onclick="handleLogout()">LOGOUT</button>
        </div>
    </header>
    
    <div class="container">
        <div class="category-tabs">
            <button class="category-btn active" id="tab-자유주제" onclick="changeCategory('자유주제')">자유주제</button>
            <button class="category-btn" id="tab-비밀고민" onclick="changeCategory('비밀고민')">비밀고민</button>
            <button class="category-btn" id="tab-건의사항" onclick="changeCategory('건의사항')">건의사항</button>
        </div>

        <div class="main-content">
            <div class="write-section">
                <textarea id="box" placeholder="여기에 생각을 남기세요..."></textarea>
                <button class="submit-btn" onclick="savePost()">외치기</button>
            </div>
            <div id="board"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://jfsaccbtbvuglvlgagus.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_XU8l4rpJsFPlaHj3cny84Q_v53odH1k"; 
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        var currentCategory = '자유주제';
        
        let myName = localStorage.getItem('reasn_user_name') || '미확인 회원';
        let myRole = localStorage.getItem('reasn_user_role') || 'USER';

        window.onload = async function() {
            document.getElementById('userText').innerText = myName + " (" + myRole + ")";
            displayPosts();

            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session && session.user) {
                    const user = session.user;
                    myName = user.user_metadata.display_name || myName;
                    myRole = user.user_metadata.role || myRole;
                    
                    localStorage.setItem('reasn_user_name', myName);
                    localStorage.setItem('reasn_user_role', myRole);

                    document.getElementById('userText').innerText = myName + " (" + myRole + ")";
                }
            } catch (e) {
                console.log("세션 체크 건너뜀");
            }
        }

        function changeCategory(categoryName) {
            currentCategory = categoryName;
            var buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => {
                if(btn.id === 'tab-' + categoryName) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            displayPosts();
        }

        // 📝 글 저장
        async function savePost() {
            var input = document.getElementById('box');
            var text = input.value.trim();
            if (text === '') return alert('내용을 입력해주세요!');

            let displayAuthor = myName;
            if (myRole === 'ADMIN') {
                displayAuthor = '관리자';
            } else if (myRole === 'VIP') {
                displayAuthor = '익명';
            }

            const { data, error } = await supabaseClient
                .from('reasn_posts')
                .insert([
                    { category: currentCategory, content: text, user_name: displayAuthor, user_role: myRole }
                ]);

            if (error) {
                alert('글 등록 실패: ' + error.message);
            } else {
                input.value = '';
                displayPosts(); 
            }
        }

        // 🔍 글 & 댓글 불러와서 뿌리기
        async function displayPosts() {
            var board = document.getElementById('board');
            
            // 1. 글 가져오기
            const { data: posts, error } = await supabaseClient
                .from('reasn_posts')
                .select('*')
                .eq('category', currentCategory)
                .order('created_at', { ascending: false })
                .limit(100);

            if (error) {
                board.innerHTML = '<p style="text-align:center; color:red; margin-top:20px;">불러오기 실패: ' + error.message + '</p>';
                return;
            }

            board.innerHTML = '';

            if(!posts || posts.length === 0) {
                board.innerHTML = '<p style="text-align:center; color:#999; margin-top:40px;">아직 작성된 글이 없습니다.</p>';
                return;
            }

            // 2. 댓글 전체 가져오기 (성능을 위해 한 번에 땡겨옵니다)
            const { data: allComments } = await supabaseClient
                .from('reasn_comments')
                .select('*')
                .order('created_at', { ascending: true });

            for (var i = 0; i < posts.length; i++) {
                const post = posts[i];
                
                var newPost = document.createElement('div');
                newPost.className = 'post';

                // 작성자 및 뱃지
                var authorTag = document.createElement('div');
                authorTag.className = 'post-author';
                authorTag.innerText = post.user_name;

                if (post.user_name !== '익명') {
                    var badge = document.createElement('span');
                    if (post.user_role === 'ADMIN') {
                        badge.className = 'author-badge badge-admin';
                        badge.innerText = 'ADMIN';
                    } else if (post.user_role === 'VIP') {
                        badge.className = 'author-badge badge-vip';
                        badge.innerText = 'VIP';
                    } else {
                        badge.className = 'author-badge badge-user';
                        badge.innerText = 'USER';
                    }
                    authorTag.appendChild(badge);
                }
                newPost.appendChild(authorTag);

                // 본문
                var contentTag = document.createElement('div');
                contentTag.className = 'post-content';
                contentTag.innerText = post.content;
                newPost.appendChild(contentTag);

                // 시간
                var timeTag = document.createElement('div');
                timeTag.className = 'post-time';
                var dateStr = new Date(post.created_at).toLocaleString('ko-KR');
                timeTag.innerText = dateStr;
                newPost.appendChild(timeTag);

                // 💬 댓글 영역 생성
                var commentSection = document.createElement('div');
                commentSection.className = 'comment-section';

                var commentList = document.createElement('div');
                commentList.className = 'comment-list';

                // 이 글에 달린 댓글들만 필터링해서 꽂아넣기
                if (allComments) {
                    const postComments = allComments.filter(c => c.post_id == post.id);
                    postComments.forEach(comment => {
                        var commentItem = document.createElement('div');
                        commentItem.className = 'comment-item';
                        
                        let badgeHtml = '';
                        if (comment.user_name !== '익명') {
                            badgeHtml = `<span class="comment-badge" style="color:${comment.user_role==='ADMIN'?'#ff3b30':'#555'}">${comment.user_role}</span>`;
                        }

                        commentItem.innerHTML = `${badgeHtml}<span class="comment-author">${comment.user_name}</span><span>${comment.content}</span>`;
                        commentList.appendChild(commentItem);
                    });
                }
                commentSection.appendChild(commentList);

                // 댓글 입력창 양식
                var inputFlex = document.createElement('div');
                inputFlex.className = 'comment-input-box';
                inputFlex.innerHTML = `
                    <input type="text" class="comment-input" id="reply-input-${post.id}" placeholder="댓글을 입력하세요...">
                    <button class="comment-btn" onclick="saveComment(${post.id})">등록</button>
                `;
                commentSection.appendChild(inputFlex);
                newPost.appendChild(commentSection);

                board.appendChild(newPost);
            }
        }

        // 📝 댓글 저장 기능
        async function saveComment(postId) {
            var input = document.getElementById('reply-input-' + postId);
            var text = input.value.trim();
            if (text === '') return alert('댓글 내용을 입력해주세요!');

            let displayAuthor = myName;
            // 댓글도 관리자는 '관리자', VIP는 '익명' 규칙 적용
            if (myRole === 'ADMIN') {
                displayAuthor = '관리자';
            } else if (myRole === 'VIP') {
                displayAuthor = '익명';
            }

            const { data, error } = await supabaseClient
                .from('reasn_comments')
                .insert([
                    { post_id: postId, content: text, user_name: displayAuthor, user_role: myRole }
                ]);

            if (error) {
                alert('댓글 등록 실패: ' + error.message);
            } else {
                input.value = '';
                displayPosts(); // 새로고침하여 댓글 반영
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            localStorage.clear(); 
            alert('로그아웃 되었습니다.');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
