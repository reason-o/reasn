<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reasn - 익명 커뮤니티</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 🖤 블랙 앤 화이트 테마 스타일링 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background-color: #fafafa; color: #111; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background-color: #111; color: #fff; padding: 20px; text-align: center; font-weight: bold; font-size: 20px; position: relative; letter-spacing: 1px; }
        .user-info { position: absolute; right: 20px; top: 22px; font-size: 13px; font-weight: normal; color: #ccc; }
        .logout-btn { background: none; border: 1px solid #555; color: #ccc; padding: 3px 8px; margin-left: 10px; border-radius: 3px; cursor: pointer; font-size: 11px; transition: all 0.2s; }
        .logout-btn:hover { background-color: #fff; color: #111; border-color: #fff; }
        
        .container { display: flex; flex: 1; max-width: 800px; width: 100%; margin: 0 auto; padding: 20px 10px; flex-direction: column; }
        
        /* 카테고리 탭 */
        .category-tabs { display: flex; border-bottom: 2px solid #111; margin-bottom: 20px; }
        .category-btn { flex: 1; padding: 15px; background: none; border: none; font-size: 15px; font-weight: bold; color: #888; cursor: pointer; text-align: center; transition: all 0.2s; }
        .category-btn:hover, .category-btn.active { color: #111; }
        .category-btn.active { border-bottom: 4px solid #111; margin-bottom: -2px; }

        /* 글쓰기 영역 */
        .write-section { background: #fff; padding: 20px; border: 1px solid #e1e1e1; margin-bottom: 30px; display: flex; flex-direction: column; gap: 10px; }
        .title-input { width: 100%; padding: 12px; border: 1px solid #e1e1e1; font-size: 15px; font-weight: bold; }
        .title-input:focus { outline: 1px solid #111; }
        textarea { width: 100%; height: 120px; padding: 12px; border: 1px solid #e1e1e1; resize: none; font-size: 14px; }
        textarea:focus { outline: 1px solid #111; }
        .submit-btn { width: 100%; padding: 14px; background-color: #111; color: #fff; border: none; cursor: pointer; font-size: 15px; font-weight: bold; letter-spacing: 1px; transition: background 0.2s; }
        .submit-btn:hover { background-color: #333; }
        
        /* 게시글 카드 (목록 레이아웃) */
        .post { background: #fff; padding: 18px 24px; margin-top: 12px; border: 1px solid #e1e1e1; }
        
        /* 제목 한 줄 레이아웃 (클릭 가능하게) */
        .post-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .post-title-line { font-size: 16px; font-weight: bold; color: #111; flex: 1; margin-right: 15px; }
        .post-meta-line { font-size: 12px; color: #888; display: flex; align-items: center; gap: 10px; }
        
        /* 펼쳐지는 상세 내용 영역 (기본 숨김) */
        .post-body { display: none; padding-top: 20px; border-top: 1px solid #f0f0f0; margin-top: 15px; }
        
        .author-badge { display: inline-block; padding: 2px 6px; font-size: 10px; font-weight: bold; letter-spacing: 0.5px; }
        .badge-user { background-color: #f0f0f0; color: #555; }
        .badge-vip { background-color: #111; color: #fff; }
        .badge-admin { background-color: #ff3b30; color: #fff; }
        
        .post-content { font-size: 14px; line-height: 1.6; color: #333; margin-bottom: 14px; white-space: pre-wrap; }
        .post-time { font-size: 11px; color: #aaa; margin-bottom: 15px; }
        
        /* 수정/삭제 버튼 그룹 */
        .action-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .action-btn { background: none; border: 1px solid #ddd; color: #666; padding: 5px 12px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .action-btn:hover { border-color: #111; color: #111; }
        .delete-btn:hover { border-color: #ff3b30; color: #ff3b30; }

        /* 댓글 영역 */
        .comment-section { border-top: 1px dashed #e1e1e1; background: #fafafa; margin: 15px -24px -18px -24px; padding: 20px 24px; }
        .comment-list { margin-bottom: 15px; }
        .comment-item { font-size: 13px; margin-bottom: 10px; line-height: 1.4; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
        .comment-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .comment-author { font-weight: bold; color: #111; margin-right: 6px; }
        .comment-badge { font-size: 9px; padding: 1px 4px; margin-right: 6px; background: #eee; }
        
        .comment-input-box { display: flex; gap: 8px; margin-top: 10px; }
        .comment-input { flex: 1; padding: 8px 12px; border: 1px solid #e1e1e1; font-size: 13px; }
        .comment-input:focus { outline: 1px solid #111; }
        .comment-btn { padding: 8px 15px; background: #111; color: #fff; border: none; font-size: 13px; font-weight: bold; cursor: pointer; }
        .comment-btn:hover { background-color: #333; }
    </style>
</head>
<body>

    <header>
        🤫 reasn
        <div class="user-info" id="userInfo">
            <span id="userText">로딩 중...</span>
            <button class="logout-btn" onclick="handleLogout()">LOGOUT</button>
        </div>
    </header>
    
    <div class="container">
        <div class="category-tabs">
            <button class="category-btn active" id="tab-자유주제" onclick="changeCategory('자유주제')">자유주제</button>
            <button class="category-btn" id="tab-비밀고민" onclick="changeCategory('비밀고민')">비밀고민</button>
            <button class="category-btn" id="tab-건의사항" onclick="changeCategory('건의사항')">건의사항</button>
        </div>

        <div class="main-content">
            <div class="write-section">
                <input type="text" id="postTitle" class="title-input" placeholder="제목을 입력하세요">
                <textarea id="box" placeholder="여기에 생각을 남기세요..."></textarea>
                <button class="submit-btn" onclick="savePost()">외치기</button>
            </div>
            <div id="board"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://jfsaccbtbvuglvlgagus.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_XU8l4rpJsFPlaHj3cny84Q_v53odH1k"; 
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        var currentCategory = '자유주제';
        
        let myName = localStorage.getItem('reasn_user_name') || '미확인 회원';
        let myRole = localStorage.getItem('reasn_user_role') || 'USER';
        let myEmail = 'unknown'; // 내 이메일 저장용 변수 추가

        window.onload = async function() {
            document.getElementById('userText').innerText = myName + " (" + myRole + ")";
            displayPosts();

            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session && session.user) {
                    const user = session.user;
                    myName = user.user_metadata.display_name || myName;
                    myRole = user.user_metadata.role || myRole;
                    myEmail = user.email; // 이메일 실시간 매핑

                    localStorage.setItem('reasn_user_name', myName);
                    localStorage.setItem('reasn_user_role', myRole);

                    document.getElementById('userText').innerText = myName + " (" + myRole + ")";
                }
            } catch (e) {
                console.log("세션 체크 건너뜀");
            }
        }

        function changeCategory(categoryName) {
            currentCategory = categoryName;
            var buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => {
                if(btn.id === 'tab-' + categoryName) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            displayPosts();
        }

        // 📝 글 저장
        async function savePost() {
            var titleInput = document.getElementById('postTitle');
            var contentInput = document.getElementById('box');
            
            var titleText = titleInput.value.trim();
            var contentText = contentInput.value.trim();
            
            if (titleText === '') return alert('제목을 입력해주세요!');
            if (contentText === '') return alert('내용을 입력해주세요!');

            let displayAuthor = myName;
            if (myRole === 'ADMIN') displayAuthor = '관리자';
            else if (myRole === 'VIP') displayAuthor = '익명';

            const { data, error } = await supabaseClient
                .from('reasn_posts')
                .insert([
                    { 
                        category: currentCategory, 
                        title: titleText, 
                        content: contentText, 
                        user_name: displayAuthor, 
                        user_role: myRole,
                        user_email: myEmail // 이메일 함께 저장
                    }
                ]);

            if (error) {
                alert('글 등록 실패: ' + error.message);
            } else {
                titleInput.value = '';
                contentInput.value = '';
                displayPosts(); 
            }
        }

        // 🔍 글 목록 및 토글 상세창 띄우기
        async function displayPosts() {
            var board = document.getElementById('board');
            
            const { data: posts, error } = await supabaseClient
                .from('reasn_posts')
                .select('*')
                .eq('category', currentCategory)
                .order('created_at', { ascending: false })
                .limit(100);

            if (error) {
                board.innerHTML = '<p style="text-align:center; color:red; margin-top:20px;">불러오기 실패: ' + error.message + '</p>';
                return;
            }

            board.innerHTML = '';

            if(!posts || posts.length === 0) {
                board.innerHTML = '<p style="text-align:center; color:#999; margin-top:40px;">아직 작성된 글이 없습니다.</p>';
                return;
            }

            const { data: allComments } = await supabaseClient
                .from('reasn_comments')
                .select('*')
                .order('created_at', { ascending: true });

            for (var i = 0; i < posts.length; i++) {
                const post = posts[i];
                
                var newPost = document.createElement('div');
                newPost.className = 'post';

                // [상단 라인] 클릭 시 본문 열림
                var postHeader = document.createElement('div');
                postHeader.className = 'post-header';
                postHeader.setAttribute('onclick', `togglePostBody(${post.id})`);

                var titleLine = document.createElement('div');
                titleLine.className = 'post-title-line';
                titleLine.innerText = post.title || '제목 없음';
                
                var metaLine = document.createElement('div');
                metaLine.className = 'post-meta-line';
                metaLine.innerText = post.user_name;

                if (post.user_name !== '익명') {
                    var badge = document.createElement('span');
                    badge.className = `author-badge badge-${post.user_role.toLowerCase()}`;
                    badge.innerText = post.user_role;
                    metaLine.appendChild(badge);
                }

                postHeader.appendChild(titleLine);
                postHeader.appendChild(metaLine);
                newPost.appendChild(postHeader);

                // [상세 내용 바디] (클릭 전엔 숨김 상태)
                var postBody = document.
