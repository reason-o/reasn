<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>reasn - 익명 커뮤니티</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 🖤 블랙 앤 화이트 테마 */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: Arial, sans-serif; background-color: #fafafa; color: #111; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background-color: #111; color: #fff; padding: 20px; text-align: center; font-weight: bold; font-size: 20px; position: relative; letter-spacing: 1px; z-index: 10; }
        .user-info { position: absolute; right: 20px; top: 22px; font-size: 13px; font-weight: normal; color: #ccc; z-index: 11; }
        .logout-btn { background: none; border: 1px solid #555; color: #ccc; padding: 3px 8px; margin-left: 10px; border-radius: 3px; cursor: pointer; font-size: 11px; display: inline-block; }
        .logout-btn:hover { background-color: #fff; color: #111; border-color: #fff; }
        
        .container { display: flex; flex: 1; max-width: 800px; width: 100%; margin: 0 auto; padding: 20px 10px; flex-direction: column; position: relative; z-index: 1; }
        
        /* 📱 모바일 탭 터치 및 스크롤 안정화 */
        .board-controls { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #111; margin-bottom: 20px; gap: 10px; position: relative; }
        .category-tabs { display: flex; flex: 1; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
        .category-tabs::-webkit-scrollbar { display: none; }
        
        .category-btn { padding: 15px 12px; background: none; border: none; font-size: 15px; font-weight: bold; color: #888; cursor: pointer; transition: all 0.2s; border-bottom: 4px solid transparent; flex-shrink: 0; display: inline-block; }
        .category-btn:hover, .category-btn.active { color: #111; }
        .category-btn.active { border-bottom: 4px solid #111; margin-bottom: -2px; color: #111; }
        
        .open-write-btn { padding: 10px 15px; background-color: #111; color: #fff; border: none; font-size: 13px; font-weight: bold; cursor: pointer; letter-spacing: 0.5px; flex-shrink: 0; display: inline-block; }
        .open-write-btn:hover { background-color: #333; }

        /* 📋 게시글 카드 목록 */
        .post { background: #fff; padding: 18px 24px; margin-top: 12px; border: 1px solid #e1e1e1; }
        .post-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .post-title-line { font-size: 16px; font-weight: bold; color: #111; flex: 1; margin-right: 15px; display: flex; gap: 15px; }
        .post-num { color: #888; font-weight: normal; font-size: 14px; min-width: 25px; }
        
        .post-meta-line { font-size: 12px; color: #888; display: flex; align-items: center; gap: 10px; }
        
        /* 본문 내용 영역 */
        .post-body { display: none; padding-top: 20px; border-top: 1px solid #f0f0f0; margin-top: 15px; }
        .author-badge { display: inline-block; padding: 2px 6px; font-size: 10px; font-weight: bold; }
        .badge-user { background-color: #f0f0f0; color: #555; }
        .badge-vip { background-color: #111; color: #fff; }
        .badge-admin { background-color: #ff3b30; color: #fff; }
        
        .post-content { font-size: 14px; line-height: 1.6; color: #333; margin-bottom: 14px; white-space: pre-wrap; }
        .post-time { font-size: 11px; color: #aaa; margin-bottom: 15px; }
        
        /* 버튼 */
        .action-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .action-btn { background: none; border: 1px solid #ddd; color: #666; padding: 5px 12px; font-size: 12px; cursor: pointer; }
        .action-btn:hover { border-color: #111; color: #111; }
        .delete-btn:hover { border-color: #ff3b30; color: #ff3b30; }

        /* 댓글 영역 */
        .comment-section { border-top: 1px dashed #e1e1e1; background: #fafafa; margin: 15px -24px -18px -24px; padding: 20px 24px; }
        .comment-list { margin-bottom: 15px; }
        .comment-item { font-size: 13px; margin-bottom: 10px; line-height: 1.4; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
        .comment-item:last-child { border-bottom: none; padding-bottom: 0; }
        .comment-author { font-weight: bold; color: #111; margin-right: 6px; }
        .comment-badge { font-size: 9px; padding: 1px 4px; margin-right: 6px; background: #eee; }
        
        .comment-input-box { display: flex; gap: 8px; margin-top: 10px; }
        .comment-input { flex: 1; padding: 8px 12px; border: 1px solid #e1e1e1; font-size: 13px; }
        .comment-input:focus { outline: 1px solid #111; }
        .comment-btn { padding: 8px 15px; background: #111; color: #fff; border: none; font-size: 13px; font-weight: bold; cursor: pointer; }

        /* 모달 팝업 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: #fff; padding: 30px; width: 90%; max-width: 600px; border: 1px solid #111; display: flex; flex-direction: column; gap: 15px; position: relative; }
        .modal-title { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .modal-close { position: absolute; right: 25px; top: 25px; font-size: 25px; cursor: pointer; color: #888; padding: 5px; }
        .modal-close:hover { color: #111; }
        .title-input { width: 100%; padding: 12px; border: 1px solid #e1e1e1; font-size: 15px; font-weight: bold; }
        .title-input:focus { outline: 1px solid #111; }
        .content-textarea { width: 100%; height: 200px; padding: 12px; border: 1px solid #e1e1e1; resize: none; font-size: 14px; }
        .content-textarea:focus { outline: 1px solid #111; }
        .submit-btn { width: 100%; padding: 14px; background-color: #111; color: #fff; border: none; cursor: pointer; font-size: 15px; font-weight: bold; letter-spacing: 1px; }
        .submit-btn:hover { background-color: #333; }

        @media (max-width: 480px) {
            header { font-size: 16px; padding: 15px 10px; text-align: left; }
            .user-info { right: 10px; top: 14px; font-size: 11px; position: absolute; }
            .logout-btn { padding: 2px 6px; margin-left: 4px; font-size: 9px; }
            .category-btn { padding: 12px 10px; font-size: 14px; }
            .open-write-btn { padding: 8px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <header>
        🤫 reasn
        <div class="user-info" id="userInfo">
            <span id="userText">인증 확인 중...</span>
            <button class="logout-btn" onclick="handleLogout()">LOGOUT</button>
        </div>
    </header>
    
    <div class="container">
        <div class="board-controls">
            <div class="category-tabs">
                <button class="category-btn active" id="tab-자유게시판" onclick="changeCategory('자유게시판')">자유게시판</button>
                <button class="category-btn" id="tab-익명게시판" onclick="changeCategory('익명게시판')">익명게시판</button>
                <button class="category-btn" id="tab-건의해요" onclick="changeCategory('건의해요')">건의해요</button>
            </div>
            <button class="open-write-btn" onclick="openModal()">+ 글쓰기</button>
        </div>

        <div class="main-content">
            <div id="board"></div>
        </div>
    </div>

    <div class="modal-overlay" id="writeModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="modal-title">새 글 쓰기</div>
            <input type="text" id="postTitle" class="title-input" placeholder="제목을 입력하세요">
            <textarea id="box" class="content-textarea" placeholder="내용을 채워주세요..."></textarea>
            <button class="submit-btn" onclick="savePost()">외치기</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://jfsaccbtbvuglvlgagus.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_XU8l4rpJsFPlaHj3cny84Q_v53odH1k"; 
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        var currentCategory = '자유게시판';
        
        let myName = localStorage.getItem('reasn_user_name') || '회원';
        let myRole = localStorage.getItem('reasn_user_role') || 'USER';
        let myEmail = localStorage.getItem('reasn_user_email') || 'unknown';

        window.onload = function() {
            // 1. UI 렌더링 및 기본 글 불러오기 무조건 선행
            updateUserUI();
            displayPosts();

            // 2. 비동기 세션 처리는 별도로 독립시켜 먹통 문제 방지
            setTimeout(function() {
                checkSession();
            }, 10);
        }

        async function checkSession() {
            try {
                const { data: dataSession, error } = await supabaseClient.auth.getSession();
                if (dataSession && dataSession.session && dataSession.session.user) {
                    const user = dataSession.session.user;
                    myName = user.user_metadata.display_name || myName;
                    myRole = user.user_metadata.role || myRole;
                    myEmail = user.email || myEmail;

                    localStorage.setItem('reasn_user_name', myName);
                    localStorage.setItem('reasn_user_role', myRole);
                    localStorage.setItem('reasn_user_email', myEmail);
                }
            } catch (e) {
                console.log("세물 세션 확인 생략");
            } finally {
                updateUserUI();
            }
        }

        function updateUserUI() {
            const userTextEl = document.getElementById('userText');
            if (userTextEl) {
                userTextEl.innerText = myName + " (" + myRole + ")";
            }
        }

        function openModal() { 
            document.getElementById('writeModal').style.display = 'flex'; 
        }
        
        function closeModal() {
            document.getElementById('writeModal').style.display = 'none';
            document.getElementById('postTitle').value = '';
            document.getElementById('box').value = '';
        }

        function changeCategory(categoryName) {
            currentCategory = categoryName;
            var buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => {
                if(btn.id === 'tab-' + categoryName) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            displayPosts();
        }

        async function savePost() {
            var titleInput = document.getElementById('postTitle');
            var contentInput = document.getElementById('box');
            
            var titleText = titleInput.value.trim();
            var contentText = contentInput.value.trim();
            
            if (titleText === '') return alert('제목을 입력해주세요!');
            if (contentText === '') return alert('내용을 입력해주세요!');

            let displayAuthor = myName;
            if (myRole === 'ADMIN') displayAuthor = '관리자';
            else if (currentCategory === '익명게시판') displayAuthor = '익명';

            const { data, error } = await supabaseClient
                .from('reasn_posts')
                .insert([{ 
                    category: currentCategory, 
                    title: titleText, 
                    content: contentText, 
                    user_name: displayAuthor, 
                    user_role: myRole, 
                    user_email: myEmail 
                }]);

            if (error) {
                alert('글 등록 실패: ' + error.message);
            } else {
                closeModal();
                displayPosts(); 
            }
        }

        async function displayPosts() {
            var board = document.getElementById('board');
            if (!board) return;
            
            board.innerHTML = '<p style="text-align:center; color:#999; margin-top:20px;">불러오는 중...</p>';
            
            try {
                const { data: posts, error } = await supabaseClient
                    .from('reasn_posts')
                    .select('*')
                    .eq('category', currentCategory)
                    .order('created_at', { ascending: true }) 
                    .limit(100);

                if (error) {
                    board.innerHTML = '<p style="text-align:center; color:red; margin-top:20px;">불러오기 실패: ' + error.message + '</p>';
                    return;
                }

                board.innerHTML = '';

                if(!posts || posts.length === 0) {
                    board.innerHTML = '<p style="text-align:center; color:#999; margin-top:40px;">아직 작성된 글이 없습니다.</p>';
                    return;
                }

                const { data: allComments } = await supabaseClient
                    .from('reasn_comments')
                    .select('*')
                    .order('created_at', { ascending: true });

                let displayList = [];
                for (var i = 0; i < posts.length; i++) {
                    posts[i].local_num = i + 1;
                    displayList.unshift(posts[i]); 
                }

                for (var i = 0; i < displayList.length; i++) {
                    const post = displayList[i];
                    
                    var newPost = document.createElement('div');
                    newPost.className = 'post';

                    var postHeader = document.createElement('div');
                    postHeader.className = 'post-header';
                    postHeader.setAttribute('onclick', `togglePostBody(${post.id})`);

                    var titleLine = document.createElement('div');
                    titleLine.className = 'post-title-line';
                    titleLine.innerHTML = `<span class="post-num">${post.local_num}</span> <span>${post.title || '제목 없음'}</span>`;
                    
                    var metaLine = document.createElement('div');
                    metaLine.className = 'post-meta-line';
                    
                    let displayAuthorName = post.user_name;
                    if (post.user_role !== 'ADMIN' && currentCategory === '익명게시판') {
                        displayAuthorName = '익명';
                    }
                    metaLine.innerText = displayAuthorName;

                    if (displayAuthorName !== '익명') {
                        var badge = document.createElement('span');
                        badge.className = `author-badge badge-${post.user_role.toLowerCase()}`;
                        badge.innerText = post.user_role;
                        metaLine.appendChild(badge);
                    }

                    postHeader.appendChild(titleLine);
                    post
