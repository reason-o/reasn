<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REASN으로 초대합니다.</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 🖤 극도의 미니멀 화이트 & 줄노트(Line) 레이아웃 */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #ffffff; color: #111; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background-color: #ffffff; color: #111; padding: 20px; text-align: center; font-weight: bold; font-size: 22px; position: relative; letter-spacing: 1px; border-bottom: 1px solid #111; z-index: 10; }
        .logo-link { color: #111; text-decoration: none; cursor: pointer; }

        /* 👤 우측 상단 내 정보 펼침 카드 */
        .user-info-wrapper { position: absolute; right: 20px; top: 18px; z-index: 11; display: flex; flex-direction: column; align-items: flex-end; }
        .my-profile-trigger { font-size: 13px; font-weight: 600; color: #111; cursor: pointer; background: #f5f5f5; padding: 4px 10px; border-radius: 20px; border: 1px solid #eee; transition: all 0.2s; }
        .my-profile-trigger:hover { background: #111; color: #fff; border-color: #111; }
        
        .my-profile-card { display: none; margin-top: 5px; background: #ffffff; border: 1px solid #111; padding: 15px; width: 230px; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 4px; }
        .profile-row { font-size: 12px; color: #333; margin-bottom: 8px; line-height: 1.4; }
        .profile-row strong { color: #111; }
        
        .header-btns { margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; display: flex; flex-direction: column; gap: 6px; }
        .btn-row { display: flex; gap: 6px; justify-content: space-between; }
        .top-btn { background: none; border: 1px solid #ddd; color: #444; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; flex: 1; text-align: center; }
        .top-btn:hover { border-color: #111; color: #111; }
        .logout-btn { background: none; border: 1px solid #ff3b30; color: #ff3b30; }
        .logout-btn:hover { background: #ff3b30; color: #fff; border-color: #ff3b30; }
        .login-gate-btn { background: #111; border: 1px solid #111; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; font-weight: bold; }

        .container { display: flex; flex: 1; max-width: 700px; width: 100%; margin: 0 auto; padding: 15px 15px; flex-direction: column; position: relative; z-index: 1; }
        
        /* 📱 모바일 카테고리 탭 */
        .board-controls { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; margin-bottom: 10px; gap: 10px; }
        .category-tabs { display: flex; flex: 1; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .category-tabs::-webkit-scrollbar { display: none; }
        
        .category-btn { padding: 15px 12px; background: none; border: none; font-size: 15px; font-weight: 500; color: #999; cursor: pointer; transition: all 0.2s; border-bottom: 3px solid transparent; flex-shrink: 0; }
        .category-btn:hover, .category-btn.active { color: #111; }
        .category-btn.active { border-bottom: 3px solid #111; font-weight: bold; color: #111; }
        
        .open-write-btn { padding: 8px 14px; background-color: #111; color: #fff; border: none; font-size: 13px; font-weight: bold; cursor: pointer; letter-spacing: 0.5px; flex-shrink: 0; border-radius: 4px; }
        .open-write-btn:hover { background-color: #333; }

        /* 📋 각 섹션 제어 클래스 */
        .view-section { display: none; }
        .listViewSection { display: block; } 
        .writeViewSection { flex-direction: column; gap: 15px; padding: 10px 4px; }
        
        /* 👁️ 독립된 글 상세보기 뷰 섹션 */
        .detailViewSection { flex-direction: column; padding: 15px 4px; }
        .detail-title { font-size: 20px; font-weight: bold; color: #111; line-height: 1.4; margin-bottom: 10px; word-break: break-all; }
        .detail-meta { font-size: 13px; color: #666; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #eee; padding-bottom: 12px; margin-bottom: 20px; }
        .detail-content { font-size: 15px; line-height: 1.7; color: #222; white-space: pre-wrap; word-break: break-all; min-height: 120px; margin-bottom: 25px; }
        .detail-content a { color: #007bff; text-decoration: underline; }

        /* 📑 상세보기 하단 서브 리스트 컨테이너 스타일 */
        .detail-sub-list-wrapper { margin-top: 40px; border-top: 2px solid #111; padding-top: 20px; width: 100%; }
        .sub-list-title { font-size: 14px; font-weight: bold; color: #555; margin-bottom: 12px; letter-spacing: 0.5px; }

        /* ✍️ 글 작성 뷰 관련 스타일 */
        .write-view-title { font-size: 18px; font-weight: bold; color: #111; border-bottom: 2px solid #111; padding-bottom: 8px; margin-bottom: 5px; }
        .title-input { width: 100%; padding: 12px; border: 1px solid #ddd; font-size: 14px; font-weight: bold; border-radius: 4px; background: #fff; }
        .title-input:focus { outline: none; border-color: #111; }
        .content-textarea { width: 100%; height: 250px; padding: 12px; border: 1px solid #ddd; resize: none; font-size: 14px; border-radius: 4px; line-height: 1.6; background: #fff; }
        .content-textarea:focus { outline: none; border-color: #111; }
        
        .notice-check-wrapper { display: none; align-items: center; gap: 6px; font-size: 13px; font-weight: bold; color: #111; margin-top: 2px; }
        .notice-check-wrapper input { cursor: pointer; width: 15px; height: 15px; }
        
        .write-btn-group { display: flex; gap: 10px; margin-top: 5px; }
        .submit-btn { flex: 1; padding: 14px; background-color: #111; color: #fff; border: none; cursor: pointer; font-size: 14px; font-weight: bold; border-radius: 4px; letter-spacing: 0.5px; }
        .submit-btn:hover { background-color: #333; }
        .cancel-btn { background-color: #fff; color: #555; border: 1px solid #ddd; }
        .cancel-btn:hover { background-color: #f5f5f5; color: #111; border-color: #111; }

        /* 🔍 검색 바 */
        .search-wrapper { display: flex; gap: 8px; margin-bottom: 5px; border-bottom: 1px solid #eee; padding-bottom: 12px; }
        .search-input { flex: 1; padding: 9px 12px; border: 1px solid #eee; font-size: 13px; background-color: #fafafa; border-radius: 4px; }
        .search-input:focus { outline: none; border-color: #111; background-color: #fff; }
        .search-btn { padding: 9px 16px; background-color: #111; color: #fff; border: none; font-size: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; }

        /* 📝 줄노트 감성 게시글 목록 리스트 */
        .post-list-wrapper { display: flex; flex-direction: column; }
        .post { background: #fff; padding: 16px 4px; border-bottom: 1px solid #f0f0f0; transition: background 0.1s; cursor: pointer; }
        .post:hover { background-color: #fafafa; }
        .post-header { display: flex; justify-content: space-between; align-items: center; }
        
        .post-title-line { font-size: 15px; font-weight: 600; color: #111; flex: 1; margin-right: 15px; display: flex; gap: 12px; align-items: center; }
        .post-num { color: #aaa; font-weight: 400; font-size: 13px; min-width: 22px; text-align: left; }
        .comment-count-badge { color: #ff3b30; font-size: 14px; font-weight: bold; margin-left: 2px; }
        
        .notice-label { font-size: 11px; background-color: #111; color: #fff; padding: 2px 5px; font-weight: bold; border-radius: 3px; font-style: normal; }
        
        .post-meta-line { font-size: 12px; color: #888; display: flex; align-items: center; gap: 6px; }
        .clickable-author { text-decoration: none; font-weight: 500; }
        .clickable-author.can-upgrade { text-decoration: underline; color: #007bff; }
        
        .author-badge { display: inline-block; padding: 1px 5px; font-size: 9px; font-weight: bold; border-radius: 2px; }
        .badge-admin { background-color: #ffebe6; color: #ff3b30; }
        
        .action-buttons { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; border-bottom: 1px dashed #eee; padding-bottom: 15px; }
        .action-btn { background: none; border: 1px solid #eee; color: #777; padding: 4px 10px; font-size: 11px; cursor: pointer; border-radius: 3px; }
        .action-btn:hover { border-color: #111; color: #111; }
        .delete-btn:hover { border-color: #ff3b30; color: #ff3b30; }
        .hide-btn:hover { border-color: #ff9500; color: #ff9500; }
        .move-btn:hover { border-color: #007bff; color: #007bff; }
        .notice-btn:hover { border-color: #111; color: #fff; background-color: #111; }

        /* 댓글 및 대댓글 영역 */
        .comment-section { background: #fafafa; padding: 15px; border-radius: 4px; }
        .comment-list { margin-bottom: 10px; }
        .comment-item { font-size: 13px; margin-bottom: 10px; line-height: 1.5; padding-bottom: 8px; border-bottom: 1px solid #f3f3f3; position: relative; }
        .comment-item:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
        .comment-item.sub-comment { margin-left: 20px; border-left: 2px solid #ddd; padding-left: 10px; background-color: #f7f7f7; margin-top: 5px; }
        
        .comment-author { font-weight: bold; color: #222; margin-right: 6px; }
        .comment-badge { font-size: 9px; padding: 1px 3px; margin-right: 5px; background: #eee; border-radius: 2px; }
        
        .comment-actions-span { font-size: 11px; color: #888; margin-left: 8px; }
        .comment-action-link { cursor: pointer; color: #777; text-decoration: none; margin-left: 5px; }
        .comment-action-link:hover { color: #111; text-decoration: underline; }
        .comment-del-link:hover { color: #ff3b30 !important; }
        
        .comment-reply-trigger { font-size: 11px; color: #007bff; cursor: pointer; margin-left: 10px; text-decoration: underline; }
        
        .comment-input-box { display: flex; gap: 8px; margin-top: 10px; }
        .comment-input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; font-size: 13px; border-radius: 4px; }
        .comment-input:focus { outline: none; border-color: #111; }
        .comment-btn { padding: 8px 14px; background: #111; color: #fff; border: none; font-size: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; }

        /* 🔢 페이지네이션 */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 5px; margin: 25px 0 15px 0; }
        .page-btn { background: #fff; border: 1px solid #ddd; color: #333; padding: 5px 10px; font-size: 12px; cursor: pointer; border-radius: 3px; }
        .page-btn:hover, .page-btn.active { background: #111; color: #fff; border-color: #111; }
        .page-btn:disabled { background: #fff; border-color: #eee; color: #ccc; cursor: not-allowed; }

        /* 🔲 비밀번호 변경 모달 팝업 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: #fff; padding: 25px; width: 92%; max-width: 400px; border-radius: 6px; display: flex; flex-direction: column; gap: 12px; position: relative; border: 1px solid #111; }
        .modal-title { font-size: 18px; font-weight: bold; }
        .modal-close { position: absolute; right: 20px; top: 20px; font-size: 24px; cursor: pointer; color: #aaa; padding: 2px; }
        .modal-close:hover { color: #111; }

        @media (max-width: 480px) {
            header { font-size: 18px; padding: 15px 10px; text-align: left; }
            .user-info-wrapper { right: 10px; top: 12px; }
            .category-btn { padding: 12px 8px; font-size: 14px; }
            .post-title-line { font-size: 14px; }
        }
    </style>
</head>
<body>

    <header>
        <a class="logo-link" onclick="resetToHome()">🤫 reasn</a>
        
        <div class="user-info-wrapper">
            <div id="userHeaderArea">
                <button class="my-profile-trigger" id="userNicknameBtn" onclick="toggleProfileCard()">로딩 회원</button>
            </div>
            
            <div class="my-profile-card" id="myProfileCard">
                <div class="profile-row"><strong>이메일:</strong> <span id="profEmail">-</span></div>
                <div class="profile-row"><strong>가입일:</strong> <span id="profDate">-</span></div>
                <div class="profile-row"><strong>등급:</strong> <span id="profRole">-</span></div>
                <div class="profile-row" id="profPointsRow"><strong>포인트:</strong> <span id="profPoints">0</span>점</div>
                
                <div class="header-btns">
                    <div class="btn-row">
                        <button class="top-btn" onclick="changeNicknamePrompt()">닉네임 변경</button>
                        <button class="top-btn" onclick="openPasswordModal()">비밀번호 수정</button>
                    </div>
                    <button class="top-btn logout-btn" onclick="handleLogout()">LOGOUT</button>
                </div>
            </div>
        </div>
    </header>
    
    <div class="container">
        
        <div id="listModeSection" class="listViewSection">
            <div class="board-controls">
                <div class="category-tabs">
                    <button class="category-btn active" id="tab-자유게시판" onclick="changeCategory('자유게시판')">자유게시판</button>
                    <button class="category-btn" id="tab-익명게시판" onclick="changeCategory('익명게시판')">익명게시판</button>
                    <button class="category-btn" id="tab-건의해요" onclick="changeCategory('건의해요')">건의해요</button>
                </div>
                <button class="open-write-btn" id="listWriteTriggerBtn" onclick="switchToWriteView()">+ 글쓰기</button>
            </div>

            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder="검색어를 입력하세요 (제목, 내용)" onkeyup="if(window.event.keyCode==13){searchPosts()}">
                <button class="search-btn" onclick="searchPosts()">검색</button>
            </div>

            <div class="post-list-wrapper" id="board"></div>
            <div class="pagination" id="paginationBox"></div>
        </div>

        <div id="writeModeSection" class="writeViewSection view-section">
            <div class="write-view-title" id="writeFormTitle">새 글 작성하기</div>
            <input type="text" id="postTitle" class="title-input" placeholder="제목을 입력하세요">
            <textarea id="box" class="content-textarea" placeholder="생각이나 이야기를 채워주세요..."></textarea>
            
            <div class="notice-check-wrapper" id="adminNoticeCheckLine">
                <label style="display:inline-flex; align-items:center; gap:5px; cursor:pointer;">
                    <input type="checkbox" id="postIsNotice"> 📌 이 게시글을 상단 고정 공지사항으로 등록
                </label>
            </div>

            <div class="write-btn-group">
                <button class="submit-btn" id="writeSubmitBtn" onclick="savePost()">확인</button>
                <button class="submit-btn cancel-btn" onclick="switchToListView()">취소</button>
            </div>
        </div>

        <div id="detailModeSection" class="detailViewSection view-section">
            <div class="detail-title" id="detPostTitle">제목 로딩 중...</div>
            <div class="detail-meta" id="detPostMeta">작성자 정보 로딩 중...</div>
            <div class="detail-content" id="detPostContent">내용 로딩 중...</div>
            
            <div id="detailActionButtons" class="action-buttons"></div>
            
            <div class="comment-section" style="border-top: 1px solid #111; margin-top:20px;">
                <div id="detailCommentList" class="comment-list"></div>
                <div class="comment-input-box">
                    <input type="text" class="comment-input" id="detailReplyInput" placeholder="댓글을 입력하세요...">
                    <button class="comment-btn" id="detailCommentSubmitBtn">등록</button>
                </div>
            </div>

            <div style="margin-top: 30px;">
                <button class="submit-btn cancel-btn" onclick="switchToListView()">← 목록으로 돌아가기</button>
            </div>
        </div>

    </div>

    <div class="modal-overlay" id="passwordModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closePasswordModal()">&times;</span>
            <div class="modal-title">비밀번호 변경</div>
            <input type="password" id="newPassword" class="title-input" placeholder="새로운 비밀번호 입력 (6자 이상)">
            <button class="submit-btn" onclick="changePassword()">변경 완료</button>
        </div>
    </div>

    <script>
        var currentCategory = '자유게시판';
        var writeTargetCategory = '자유게시판'; 
        
        var myName = '비회원';
        var myRole = 'GUEST'; 
        var myEmail = 'unknown';
        var myPoints = 0;    
        var myCreatedAt = '-';
        var supabaseClient = null;
        
        var fetchedPostsCache = []; 
        var editTargetPostId = null; 
        var currentOpenedPostId = null; 

        var currentPage = 1;
        var postsPerPage = 10;

        window.onload = function() {
            try {
                if (window.localStorage && localStorage.getItem('reasn_user_email')) {
                    myName = localStorage.getItem('reasn_user_name') || '회원';
                    myRole = localStorage.getItem('reasn_user_role') || 'USER';
                    myEmail = localStorage.getItem('reasn_user_email') || 'unknown';
                    myPoints = parseInt(localStorage.getItem('reasn_user_points') || '0');
                    myCreatedAt = localStorage.getItem('reasn_user_created') || '-';
                }
            } catch(e) { console.log(e); }

            updateUserUI();
            
            try {
                const SUPABASE_URL = "https://jfsaccbtbvuglvlgagus.supabase.co"; 
                const SUPABASE_KEY = "sb_publishable_XU8l4rpJsFPlaHj3cny84Q_v53odH1k"; 
                if (typeof supabase !== 'undefined') {
                    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                }
            } catch(subaErr) { console.error(subaErr); }

            displayPosts();
            setTimeout(function() { checkSession(); }, 50);

            document.addEventListener('click', function(e) {
                var card = document.getElementById('myProfileCard');
                var trigger = document.getElementById('userNicknameBtn');
                if(card && trigger && !card.contains(e.target) && !trigger.contains(e.target)) {
                    card.style.display = 'none';
                }
            });
        }

        async function checkSession() {
            if (!supabaseClient) return;
            try {
                const { data: dataSession } = await supabaseClient.auth.getSession();
                if (!dataSession || !dataSession.session) {
                    myRole = 'GUEST'; myEmail = 'unknown'; updateUserUI(); return;
                }

                if (dataSession && dataSession.session && dataSession.session.user) {
                    const user = dataSession.session.user;
                    myName = user.user_metadata.display_name || myName;
                    myRole = user.user_metadata.role || myRole;
                    myEmail = user.email || myEmail;
                    myPoints = user.user_metadata.points !== undefined ? parseInt(user.user_metadata.points) : myPoints;
                    if(user.created_at) myCreatedAt = new Date(user.created_at).toLocaleDateString('ko-KR');

                    if (myRole === 'USER') {
                        const { data: upgradeOrders } = await supabaseClient
                            .from('reasn_posts')
                            .select('*')
                            .eq('category', 'SYS_UPGRADE_ORDER')
                            .eq('content', myEmail);

                        if (upgradeOrders && upgradeOrders.length > 0) {
                            await supabaseClient.auth.updateUser({ data: { role: 'VIP', points: myPoints } });
                            myRole = 'VIP';
                            alert('💎 관리자 승인에 의해 VIP 등급으로 등업되었습니다! 다시 접속합니다.');
                        }
                    }

                    if (window.localStorage) {
                        localStorage.setItem('reasn_user_name', myName);
                        localStorage.setItem('reasn_user_role', myRole);
                        localStorage.setItem('reasn_user_email', myEmail);
                        localStorage.setItem('reasn_user_points', myPoints);
                        localStorage.setItem('reasn_user_created', myCreatedAt);
                    }
                    updateUserUI();
                }
            } catch (e) { console.log(e); }
        }

        function updateUserUI() {
            try {
                const wrapper = document.getElementById('userHeaderArea');
                if(!wrapper) return;

                if (myRole === 'GUEST') {
                    wrapper.innerHTML = `<button class="login-gate-btn" onclick="window.location.href='index.html'">로그인하기</button>`;
                } else {
                    wrapper.innerHTML = `<button class="my-profile-trigger" id="userNicknameBtn" onclick="toggleProfileCard()">${myName} (${myRole})</button>`;
                }
                
                document.getElementById('profEmail').innerText = myEmail;
                document.getElementById('profDate').innerText = myCreatedAt;
                document.getElementById('profRole').innerText = myRole;
                if (document.getElementById('profPoints')) document.getElementById('profPoints').innerText = myPoints;

                const pointsRow = document.getElementById('profPointsRow');
                if (pointsRow) {
                    if (myRole === 'ADMIN' || myRole === 'VIP') {
                        pointsRow.innerHTML = `<strong>포인트:</strong> ${myPoints}점 (등업 완료 ✨)`;
                    } else if (myPoints >= 100) {
                        pointsRow.innerHTML = `<strong>포인트:</strong> ${myPoints}점 <button style="background:#111; color:#fff; border:none; padding:2px 6px; font-size:10px; cursor:pointer; font-weight:bold; margin-left:4px; border-radius:2px;" onclick="triggerSelfUpgrade()">💎 등업하기</button>`;
                    } else {
                        pointsRow.innerHTML = `<strong>포인트:</strong> ${myPoints}점 (⏳ 등업까지 ${100 - myPoints}점)`;
                    }
                }

                const noticeLine = document.getElementById('adminNoticeCheckLine');
                if(noticeLine) noticeLine.style.display = (myRole === 'ADMIN') ? 'flex' : 'none';
            } catch(e) {}
        }

        async function changeNicknamePrompt() {
            if(!supabaseClient || myRole === 'GUEST') return;
            var newNick = prompt('변경할 새로운 닉네임을 입력하세요 (최대 10자):', myName);
            if(newNick === null) return; 
            newNick = newNick.trim();
            if(!newNick) return alert('닉네임은 공백일 수 없습니다!');
            if(newNick.length > 10) return alert('닉네임은 최대 10자까지만 가능합니다!');

            try {

            });

        async function savePost() {
            if (!supabaseClient || myRole === 'GUEST') return alert('로그인 후 이용 가능합니다.');
            var titleText = document.getElementById('postTitle').value.trim();
            var contentText = document.getElementById('box').value.trim();
            
            var checkNoticeEl = document.getElementById('postIsNotice');
            var isNoticeChecked = checkNoticeEl ? checkNoticeEl.checked : false;

            if (!titleText || !contentText) return alert('내용을 채워주세요!');

            if (editTargetPostId) {
                try {
                    const { error } = await supabaseClient
                        .from('reasn_posts')
                        .update({ title: titleText, content: contentText, is_notice: isNoticeChecked })
                        .eq('id', editTargetPostId);
                        
                    if (error) alert('수정 실패: ' + error.message);
                    else { 
                        let query = supabaseClient.from('reasn_posts').select('*').eq('category', currentCategory);
                        if (myRole !== 'ADMIN') query = query.or('is_hidden.is.null,is_hidden.eq.false');
                        const { data: posts } = await query.order('created_at', { ascending: true }).limit(200);
                        if(posts) {
                            let displayList = [];
                            for (var i = 0; i < posts.length; i++) { posts[i].local_num = i + 1; displayList.unshift(posts[i]); }
                            displayList.sort((a,b) => (b.is_notice===true?1:0) - (a.is_notice===true?1:0));
                            fetchedPostsCache = displayList;
                        }
                        loadPostDetailView(editTargetPostId); 
                    }
                } catch(e){ alert('수정 처리 오류'); }
            } else {
                let displayAuthor = myName;
                if (myRole === 'ADMIN') displayAuthor = '관리자';
                else if (writeTargetCategory === '익명게시판') displayAuthor = '익명'; 

                try {
                    const { error } = await supabaseClient
                        .from('reasn_posts')
                        .insert([{ 
                            category: writeTargetCategory, 
                            title: titleText, 
                            content: contentText, 
                            user_name: displayAuthor, 
                            user_role: myRole, 
                            user_email: myEmail,
                            is_notice: isNoticeChecked 
                        }]);
                        
                    if (error) return alert('글 등록 실패: ' + error.message);

                    if (writeTargetCategory === '자유게시판' && myRole === 'USER') {
                        myPoints += 10; 
                        localStorage.setItem('reasn_user_points', myPoints);
                        try { await supabaseClient.auth.updateUser({ data: { points: myPoints } }); } catch(uErr) {}
                    }
                    
                    currentCategory = writeTargetCategory;
                    changeCategory(currentCategory);
                } catch(e) { alert('통신 오류'); }
            }
        }

        function searchPosts() {
            try {
                var keyword = document.getElementById('searchInput').value.trim().toLowerCase();
                var filtered = fetchedPostsCache.filter(function(post) {
                    return (post.title || '').toLowerCase().includes(keyword) || (post.content || '').toLowerCase().includes(keyword);
                });
                currentPage = 1; renderPagination(filtered);
            } catch(e) { console.error(e); }
        }

        async function displayPosts() {
            var board = document.getElementById('board');
            if (!board) return;
            board.innerHTML = '<p style="text-align:center; color:#999; margin-top:20px; font-size:13px;">불러오는 중...</p>';

            try {
                let query = supabaseClient.from('reasn_posts').select('*').eq('category', currentCategory);
                if (myRole !== 'ADMIN') query = query.or('is_hidden.is.null,is_hidden.eq.false');

                const { data: posts, error } = await query.order('created_at', { ascending: true }).limit(200);
                if (error) { board.innerHTML = '<p style="text-align:center; color:red; margin-top:20px;">로드 실패</p>'; return; }

                if(!posts || posts.length === 0) {
                    fetchedPostsCache = [];
                    board.innerHTML = '<p style="text-align:center; color:#999; margin-top:40px; font-size:13px;">아직 작성된 글이 없습니다.</p>';
                    document.getElementById('paginationBox').innerHTML = '';
                    return;
                }

                let displayList = [];
                for (var i = 0; i < posts.length; i++) {
                    posts[i].local_num = i + 1;
                    displayList.unshift(posts[i]); 
                }

                displayList.sort(function(a, b) {
                    var aNotice = a.is_notice === true ? 1 : 0;
                    var bNotice = b.is_notice === true ? 1 : 0;
                    return bNotice - aNotice;
                });

                fetchedPostsCache = displayList;
                renderPagination(fetchedPostsCache);
            } catch (postError) { board.innerHTML = '<p style="text-align:center; color:red; margin-top:20px;">오류</p>'; }
        }

        function renderPagination(listData) {
            var paginationBox = document.getElementById('paginationBox');
            if(!paginationBox) return;

            var totalPosts = listData.length;
            var totalPages = Math.ceil(totalPosts / postsPerPage);
            if(currentPage > totalPages) currentPage = totalPages || 1;

            var startIndex = (currentPage - 1) * postsPerPage;
            var endIndex = startIndex + postsPerPage;
            var slicedPosts = listData.slice(startIndex, endIndex);

            renderPostsHTML(slicedPosts);

            paginationBox.innerHTML = '';
            if(totalPages <= 1) return;

            var prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn'; prevBtn.innerText = '이전'; prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = function() { currentPage--; renderPagination(listData); };
            paginationBox.appendChild(prevBtn);

            for(var p=1; p<=totalPages; p++) {
                var pBtn = document.createElement('button');
                pBtn.className = 'page-btn' + (p === currentPage ? ' active' : ''); pBtn.innerText = p;
                (function(pageIdx) { pBtn.onclick = function() { currentPage = pageIdx; renderPagination(listData); }; })(p);
                paginationBox.appendChild(pBtn);
            }

            var nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn'; nextBtn.innerText = '다음'; nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = function() { currentPage++; renderPagination(listData); };
            paginationBox.appendChild(nextBtn);
        }

        async function renderPostsHTML(postsList) {
            var board = document.getElementById('board');
            if (!board) return;
            board.innerHTML = '';

            let allComments = [];
            try {
                const { data: commentsData } = await supabaseClient.from('reasn_comments').select('post_id');
                if (commentsData) allComments = commentsData;
            } catch(cErr) {}

            for (var i = 0; i < postsList.length; i++) {
                const post = postsList[i];
                const commentCount = allComments.filter(c => c.post_id == post.id).length;

                var newPost = document.createElement('div');
                newPost.className = 'post';
                if (post.is_notice === true) newPost.style.backgroundColor = '#fcfcfc';
                else if (post.is_hidden === true) newPost.style.backgroundColor = '#fff6e6';

                newPost.setAttribute('onclick', `handlePostClick(${post.id})`);

                var postHeader = document.createElement('div');
                postHeader.className = 'post-header';

                var titleLine = document.createElement('div');
                titleLine.className = 'post-title-line';
                
                var numberOrNoticeLabel = post.is_notice === true ? '<i class="notice-label">📌 공지</i>' : `<span class="post-num">${post.local_num}</span>`;
                var tabularLabel = post.is_hidden === true ? '<span style="color:#ff9500; font-size:12px; font-weight:bold; margin-right:5px;">[숨김보관]</span>' : '';
                
                titleLine.innerHTML = `
                    ${numberOrNoticeLabel}
                    <span style="${post.is_notice === true ? 'font-weight:bold;' : ''}">${tabularLabel}${post.title || '제목 없음'}<span class="comment-count-badge">(${commentCount})</span></span>
                `;
                
                var metaLine = document.createElement('div');
                metaLine.className = 'post-meta-line';
                
                let displayAuthorName = post.user_name || '회원';
                let postRole = post.user_role || 'USER';
                if (postRole !== 'ADMIN' && currentCategory === '익명게시판') displayAuthorName = '익명';

                var authorSpan = document.createElement('span');
                authorSpan.className = 'clickable-author';
                authorSpan.innerText = displayAuthorName;
                metaLine.appendChild(authorSpan);

                // 👑 일반 회원 뱃지 제거, [관리자]일 때만 뱃지 노출 사양 적용
                if (postRole === 'ADMIN') {
                    var badge = document.createElement('span');
                    badge.className = `author-badge badge-admin`; badge.innerText = '관리자';
                    metaLine.appendChild(badge);
                }

                postHeader.appendChild(titleLine); postHeader.appendChild(metaLine);
                newPost.appendChild(postHeader);
                board.appendChild(newPost);
            }
        }

            var oldSubArea = document.getElementById('dtSubListContainerArea');
            if(oldSubArea) oldSubArea.remove();

            document.getElementById('listModeSection').style.display = 'none';
            document.getElementById('writeModeSection').style.display = 'none';
            
            const detailSection = document.getElementById('detailModeSection');

            document.getElementById('detPostTitle').innerText = '불러오는 중...';
            document.getElementById('detPostMeta').innerHTML = '';
            document.getElementById('detPostContent').innerText = '';
            document.getElementById('detailActionButtons').innerHTML = '';
            document.getElementById('detailCommentList').innerHTML = '댓글 로딩 중...';

            try {
                const { data: post, error } = await supabaseClient.from('reasn_posts').select('*').eq('id', postId).single();
                if(error || !post) {
                    document.getElementById('detPostTitle').innerText = '존재하지 않거나 삭제된 게시글입니다.';
                    return;
                }

                let tabularLabel = post.is_hidden === true ? '[숨김보관] ' : '';
                document.getElementById('detPostTitle').innerText = tabularLabel + (post.title || '제목 없음');
                
                let displayAuthorName = post.user_name || '회원';
                let postRole = post.user_role || 'USER';
                if (postRole !== 'ADMIN' && currentCategory === '익명게시판') displayAuthorName = '익명';

                // 👑 상세보기 내부 메타라인도 일반 등급 뱃지 제거 및 관리자용 세팅 동기화
                let badgeHtml = postRole === 'ADMIN' ? `<span class="author-badge badge-admin">관리자</span>` : '';
                let timeStr = post.created_at ? new Date(post.created_at).toLocaleString('ko-KR') : '';
                
                let authorClickAttr = (myRole === 'ADMIN' && post.user_email && post.user_email !== 'unknown' && postRole === 'USER')
                    ? `class="clickable-author can-upgrade" onclick="adminUpgradeUser('${post.user_email}', '${post.user_name}')"` : `class="clickable-author"`;

                document.getElementById('detPostMeta').innerHTML = `
                    <span ${authorClickAttr}>${displayAuthorName}</span> ${badgeHtml}

                    <span style="color:#aaa; font-size:12px;">${timeStr}</span>

                var btnGroup = document.getElementById('detailActionButtons');
                btnGroup.innerHTML = '';
                
                if (myRole === 'ADMIN' || (post.user_email && post.user_email !== 'unknown' && post.user_email === myEmail)) {
                    btnGroup.innerHTML += `
                        <button class="action-btn" onclick="switchToEditView(${post.id}, '${post.title.replace(/'/g, "\\'")}', ${post.is_notice})">수정</button>

                    `;
                }
                if (myRole === 'ADMIN') {
                    var hideToggleText = post.is_hidden === true ? '숨김 해제' : '숨김';
                    var noticeToggleText = post.is_notice === true ? '공지 해제' : '공지 설정';
                    btnGroup.innerHTML += `

        async function reloadCommentsArea(postId) {
            const commentListDiv = document.getElementById('detailCommentList');
            if(!commentListDiv) return;

            try {
                const { data: comments, error } = await supabaseClient.from('reasn_comments').select('*').eq('post_id', postId).order('created_at', { ascending: true });
                if(error) { commentListDiv.innerHTML = '댓글을 가져오지 못했습니다.'; return; }

                commentListDiv.innerHTML = '';
                
                let anonymousMap = new Map();
                let anonCounter = 1;

                comments.forEach(comment => {
                    var commentItem = document.createElement('div');
                    var isSub = comment.content && comment.content.startsWith('↳ ');
                    commentItem.className = 'comment-item' + (isSub ? ' sub-comment' : '');
                    
                    let commentAuthorName = comment.user_name || '익명';
                    let commentRole = comment.user_role || 'USER';
                    let badgeHtml = '';

                    if (currentCategory === '익명게시판' && commentRole !== 'ADMIN') {
                        const commenterKey = comment.user_email || comment.user_name;
                        if (!anonymousMap.has(commenterKey)) anonymousMap.set(commenterKey, anonCounter++);
                        commentAuthorName = `익명${anonymousMap.get(commenterKey)}`;
                    } else {
                        if (commentAuthorName !== '익명') {
                            badgeHtml = `<span class="comment-badge" style="color:${commentRole==='ADMIN'?'#ff3b30':'#007bff'}">${commentRole}</span>`;
                        }
                    }

                    let actionHtml = '';
                    if (myRole === 'ADMIN' || (comment.user_email && comment.user_email !== 'unknown' && comment.user_email === myEmail)) {
                        actionHtml = `
                            <span class="comment-actions-span">
                                <a class="comment-action-link" onclick="editComment(${comment.id}, '${(comment.content || '').replace(/'/g, "\\'")}')">[수정]</a>
                                <a class="comment-action-link comment-del-link" onclick="deleteComment(${comment.id})">[삭제]</a>
                            </span>
                        `;
                    }

                    var replyTriggerHtml = !isSub ? `<span class="comment-reply-trigger" onclick="setupSubCommentInput('${commentAuthorName}')">답글</span>` : "";

                    commentItem.innerHTML = `${badgeHtml}<span class="comment-author">${commentAuthorName}</span><span>${comment.content || ''}</span>${actionHtml}${replyTriggerHtml}`;
                    commentListDiv.appendChild(commentItem);
                });

                document.getElementById('detailCommentSubmitBtn').setAttribute('onclick', `saveComment(${postId})`);

            } catch(ce) { commentListDiv.innerHTML = '댓글 렌더링 지연'; }
        }

        function switchToEditView(postId, oldTitle, isNoticeStatus) {
            if(myRole === 'GUEST') return;
            editTargetPostId = postId;
            writeTargetCategory = currentCategory; 
            
            var oldContent = document.getElementById(`detPostContent`).innerText;
            
            document.getElementById('writeFormTitle').innerText = '게시글 수정하기';
            document.getElementById('postTitle').value = oldTitle;
            document.getElementById('box').value = oldContent;
            
            var checkNoticeEl = document.getElementById('postIsNotice');
            if(checkNoticeEl) checkNoticeEl.checked = (isNoticeStatus === true);
            
            document.getElementById('writeSubmitBtn').innerText = '확인';
            
            document.getElementById('listModeSection').style.display = 'none';
            document.getElementById('detailModeSection').style.display = 'none';
            document.getElementById('writeModeSection').style.display = 'flex';
            window.scrollTo({ top: 0 });
        }

        async function toggleNoticePost(postId, currentNoticeStatus) {
            if(!supabaseClient || myRole !== 'ADMIN') return;
            var nextStatus = !currentNoticeStatus;
            if(!confirm(nextStatus ? '이 게시글을 상단 고정 공지사항으로 등록하시겠습니까?' : '이 게시글의 상단 고정 공지 설정을 해제하시겠습니까?')) return;
            try {
                const { error } = await supabaseClient.from('reasn_posts').update({ is_notice: nextStatus }).eq('id', postId);
                if (error) alert('공지 실패: ' + error.message);
                else {
                    let query = supabaseClient.from('reasn_posts').select('*').eq('category', currentCategory);
                    if (myRole !== 'ADMIN') query = query.or('is_hidden.is.null,is_hidden.eq.false');
                    const { data: posts } = await query.order('created_at', { ascending: true }).limit(200);
                    if(posts) {
                        let displayList = [];
                        for (var i = 0; i < posts.length; i++) { posts[i].local_num = i + 1; displayList.unshift(posts[i]); }
                        displayList.sort((a,b) => (b.is_notice===true?1:0) - (a.is_notice===true?1:0));
                        fetchedPostsCache = displayList;
                    }
                    loadPostDetailView(postId);
                }
            } catch(e) { alert('오류 발생'); }
        }

        async function editComment(commentId, currentContent) {
            if(!supabaseClient || myRole === 'GUEST') return;
            var newText = prompt('수정할 댓글 내용을 입력해 주세요:', currentContent);
            if (newText === null) return;
            if (newText.trim() === '') return alert('댓글 내용을 입력하셔야 합니다!');
            try {
                const { error } = await supabaseClient.from('reasn_comments').update({ content: newText.trim() }).eq('id', commentId);
                if (error) alert('댓글 수정 실패: ' + error.message);
                else if(currentOpenedPostId) {
                    await reloadCommentsArea(currentOpenedPostId);
                    renderDetailSubListSection(); 
                }
            } catch(e) { alert('오류 발생'); }
        }

        async function deleteComment(commentId) {
            if(!supabaseClient || myRole === 'GUEST') return;
            if(!confirm('정말 이 댓글을 삭제하시겠습니까? 데이터가 완전히 소멸됩니다.')) return;
            try {
                const { error } = await supabaseClient.from('reasn_comments').delete().eq('id', commentId);
                if (error) alert('댓글 삭제 실패: ' + error.message);
                else if(currentOpenedPostId) {
                    await reloadCommentsArea(currentOpenedPostId);
                    renderDetailSubListSection();
                }
            } catch(e) { alert('오류 발생'); }
        }

        async function toggleHidePost(postId, currentHiddenStatus) {
            if(!supabaseClient || myRole !== 'ADMIN') return;
            var nextStatus = !currentHiddenStatus; 
            if (!confirm(nextStatus ? '이 글을 일반 유저들에게 숨기고 보관함으로 이동시키겠습니까?' : '이 글의 숨김 처리를 해제하고 일반 유저들에게 다시 노출하시겠습니까?')) return;
            try {
                const { error } = await supabaseClient.from('reasn_posts').update({ is_hidden: nextStatus }).eq('id', postId);
                if (error) alert('숨김 실패: ' + error.message);
                else {
                    let query = supabaseClient.from('reasn_posts').select('*').eq('category', currentCategory);
                    if (myRole !== 'ADMIN') query = query.or('is_hidden.is.null,is_hidden.eq.false');
                    const { data: posts } = await query.order('created_at', { ascending: true }).limit(200);
                    if(posts) {
                        let displayList = [];
                        for (var i = 0; i < posts.length; i++) { posts[i].local_num = i + 1; displayList.unshift(posts[i]); }
                        displayList.sort((a,b) => (b.is_notice===true?1:0) - (a.is_notice===true?1:0));
                        fetchedPostsCache = displayList;
                    }
                    loadPostDetailView(postId);
                }
            } catch(e) { alert('오류 발생'); }
        }

        async function movePostCategory(postId) {
            if(!supabaseClient || myRole !== 'ADMIN') return;
            var targetBoard = prompt('이 글을 어느 게시판으로 옮기시겠습니까?\n\n1: 자유게시판\n2: 익명게시판\n3: 건의해요');
            if (targetBoard === null) return;
            let targetCategory = targetBoard === '1' ? '자유게시판' : targetBoard === '2' ? '익명게시판' : targetBoard === '3' ? '건의해요' : '';
            if (!targetCategory) return alert('숫자 1, 2, 3 중에서만 입력해 주세요!');
            try {
                const { error } = await supabaseClient.from('reasn_posts').update({ category: targetCategory }).eq('id', postId);
                if (error) alert('이동 실패: ' + error.message);
                else { 
                    alert(`✅ [${targetCategory}]으로 이동 완료!`); 
                    currentCategory = targetCategory;
                    switchToListView(); 
                }
            } catch(e) {}
        }

        function setupSubCommentInput(targetAuthor) {
            if(myRole === 'GUEST') return;
            var input = document.getElementById('detailReplyInput');
            if(input) { input.value = `↳ @${targetAuthor} `; input.focus(); }
        }

        async function deletePost(postId) {
            if(myRole === 'GUEST') return;
            try {
                if (!confirm('정말 이 글을 완전히 삭제하시겠습니까?')) return;
                const { error } = await supabaseClient.from('reasn_posts').delete().eq('id', postId);
                if (error) alert('삭제 실패: ' + error.message);
                else { alert('글이 정상적으로 삭제되었습니다.'); switchToListView(); }
            } catch(e){}
        }

        async function saveComment(postId) {
            if(!supabaseClient) return;
            if(myRole === 'GUEST') {
                alert('🔒 댓글 작성은 로그인 후 이용 가능합니다.'); window.location.href = 'index.html'; return;
            }
            var input = document.getElementById('detailReplyInput');
            var text = input ? input.value.trim() : "";
            if (!text) return alert('댓글 내용을 입력해주세요!');

            let displayAuthor = myName;
            if (myRole === 'ADMIN') displayAuthor = '관리자';
            else if (currentCategory === '익명게시판') displayAuthor = '익명';

            try {
                const { error } = await supabaseClient
                    .from('reasn_comments')
                    .insert([{ post_id: postId, content: text, user_name: displayAuthor, user_role: myRole, user_email: myEmail }]);

                if (error) alert('댓글 등록 실패: ' + error.message);
                else {
                    if(input) input.value = '';
                    await reloadCommentsArea(postId);
                    renderDetailSubListSection(); 
                }
            } catch(e){}
        }

        async function handleLogout() {
            try {
                if(supabaseClient) await supabaseClient.auth.signOut();
                if(window.localStorage) localStorage.clear(); 
                alert('로그아웃 되었습니다.'); window.location.href = 'index.html';
            } catch(e){ window.location.href = 'index.html'; }
        }
    </script>
</body>
</html>
