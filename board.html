<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>reasn - 커뮤니티</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 🖤 극도의 미니멀 화이트 & 줄노트(Line) 레이아웃 */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #ffffff; color: #111; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background-color: #ffffff; color: #111; padding: 20px; text-align: center; font-weight: bold; font-size: 22px; position: relative; letter-spacing: 1px; border-bottom: 1px solid #111; z-index: 10; }
        .user-info { position: absolute; right: 20px; top: 15px; font-size: 12px; font-weight: normal; color: #555; text-align: right; z-index: 11; }
        .user-stats { font-size: 11px; color: #888; margin-top: 2px; }
        
        .header-btns { margin-top: 4px; display: flex; gap: 6px; justify-content: flex-end; }
        .top-btn { background: none; border: 1px solid #ddd; color: #444; padding: 2px 6px; border-radius: 3px; cursor: pointer; font-size: 11px; }
        .top-btn:hover { border-color: #111; color: #111; }
        
        .container { display: flex; flex: 1; max-width: 700px; width: 100%; margin: 0 auto; padding: 15px 15px; flex-direction: column; position: relative; z-index: 1; }
        
        /* 📱 모바일 카테고리 탭 (상자 제거, 언더라인 스타일) */
        .board-controls { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; margin-bottom: 10px; gap: 10px; }
        .category-tabs { display: flex; flex: 1; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .category-tabs::-webkit-scrollbar { display: none; }
        
        .category-btn { padding: 15px 12px; background: none; border: none; font-size: 15px; font-weight: 500; color: #999; cursor: pointer; transition: all 0.2s; border-bottom: 3px solid transparent; flex-shrink: 0; }
        .category-btn:hover, .category-btn.active { color: #111; }
        .category-btn.active { border-bottom: 3px solid #111; font-weight: bold; color: #111; }
        
        .open-write-btn { padding: 8px 14px; background-color: #111; color: #fff; border: none; font-size: 13px; font-weight: bold; cursor: pointer; letter-spacing: 0.5px; flex-shrink: 0; }
        .open-write-btn:hover { background-color: #333; }

        /* 🔍 검색 바 */
        .search-wrapper { display: flex; gap: 8px; margin-bottom: 5px; border-bottom: 1px solid #eee; padding-bottom: 12px; }
        .search-input { flex: 1; padding: 9px 12px; border: 1px solid #eee; font-size: 13px; background-color: #fafafa; border-radius: 4px; }
        .search-input:focus { outline: none; border-color: #111; background-color: #fff; }
        .search-btn { padding: 9px 16px; background-color: #111; color: #fff; border: none; font-size: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; }

        /* 📝 줄노트 감성 게시글 목록 리스트 (박스 테두리 제거) */
        .post-list-wrapper { display: flex; flex-direction: column; }
        .post { background: #fff; padding: 16px 4px; border-bottom: 1px solid #f0f0f0; transition: background 0.1s; }
        .post:hover { background-color: #fafafa; }
        .post-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .post-title-line { font-size: 15px; font-weight: 600; color: #111; flex: 1; margin-right: 15px; display: flex; gap: 12px; align-items: center; }
        .post-num { color: #aaa; font-weight: 400; font-size: 13px; min-width: 22px; text-align: left; }
        /* 💬 제목 옆 댓글 개수 괄호 스타일 */
        .comment-count-badge { color: #ff3b30; font-size: 14px; font-weight: bold; margin-left: 2px; }
        
        .post-meta-line { font-size: 12px; color: #888; display: flex; align-items: center; gap: 6px; }
        /* 어드민 등업용 클릭 타겟 고유 커서 효과 */
        .clickable-author { text-decoration: none; font-weight: 500; }
        .clickable-author.can-upgrade { cursor: pointer; text-decoration: underline; color: #007bff; }
        
        .author-badge { display: inline-block; padding: 1px 5px; font-size: 9px; font-weight: bold; border-radius: 2px; }
        .badge-user { background-color: #f0f0f0; color: #666; }
        .badge-vip { background-color: #e6f0ff; color: #007bff; }
        .badge-admin { background-color: #ffebe6; color: #ff3b30; }
        
        /* 접고 펼쳐지는 본문 구역 */
        .post-body { display: none; padding: 15px 4px 5px 4px; }
        /* 🔗 본문 하이퍼링크 활성화 스타일 */
        .post-content { font-size: 14px; line-height: 1.6; color: #222; margin-bottom: 12px; white-space: pre-wrap; word-break: break-all; }
        .post-content a { color: #007bff; text-decoration: underline; }
        .post-time { font-size: 11px; color: #bbb; margin-bottom: 12px; }
        
        .action-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
        .action-btn { background: none; border: 1px solid #eee; color: #777; padding: 4px 10px; font-size: 11px; cursor: pointer; border-radius: 3px; }
        .action-btn:hover { border-color: #111; color: #111; }
        .delete-btn:hover { border-color: #ff3b30; color: #ff3b30; }

        /* 💬 댓글 및 대댓글 영역 스타일 고도화 */
        .comment-section { border-top: 1px dashed #e5e5e5; background: #fafafa; margin-top: 10px; padding: 15px; border-radius: 4px; }
        .comment-list { margin-bottom: 10px; }
        .comment-item { font-size: 13px; margin-bottom: 10px; line-height: 1.5; padding-bottom: 8px; border-bottom: 1px solid #f3f3f3; }
        .comment-item:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
        
        /* ↳ 대댓글용 들여쓰기 마진 구조 */
        .comment-item.sub-comment { margin-left: 20px; border-left: 2px solid #ddd; padding-left: 10px; background-color: #f7f7f7; margin-top: 5px; }
        
        .comment-author { font-weight: bold; color: #222; margin-right: 6px; }
        .comment-badge { font-size: 9px; padding: 1px 3px; margin-right: 5px; background: #eee; border-radius: 2px; }
        .comment-reply-trigger { font-size: 11px; color: #007bff; cursor: pointer; margin-left: 10px; text-decoration: underline; }
        
        .comment-input-box { display: flex; gap: 8px; margin-top: 10px; }
        .comment-input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; font-size: 13px; border-radius: 4px; }
        .comment-input:focus { outline: none; border-color: #111; }
        .comment-btn { padding: 8px 14px; background: #111; color: #fff; border: none; font-size: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; }

        /* 🔢 페이지네이션 하단 단추 스타일 */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 5px; margin: 25px 0 15px 0; }
        .page-btn { background: #fff; border: 1px solid #ddd; color: #333; padding: 5px 10px; font-size: 12px; cursor: pointer; border-radius: 3px; }
        .page-btn:hover, .page-btn.active { background: #111; color: #fff; border-color: #111; }
        .page-btn:disabled { background: #fff; border-color: #eee; color: #ccc; cursor: not-allowed; }

        /* 🔲 모달 팝업 구조 (수정 및 글쓰기 통합 인터페이스 공용 배치) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: #fff; padding: 25px; width: 92%; max-width: 550px; border-radius: 6px; display: flex; flex-direction: column; gap: 12px; position: relative; border: 1px solid #111; }
        .modal-title { font-size: 18px; font-weight: bold; }
        .modal-write-notice { font-size: 12px; color: #ff3b30; font-weight: bold; }
        .modal-close { position: absolute; right: 20px; top: 20px; font-size: 24px; cursor: pointer; color: #aaa; padding: 2px; }
        .modal-close:hover { color: #111; }
        .title-input { width: 100%; padding: 11px; border: 1px solid #ddd; font-size: 14px; font-weight: bold; border-radius: 4px; }
        .title-input:focus { outline: none; border-color: #111; }
        .content-textarea { width: 100%; height: 180px; padding: 11px; border: 1px solid #ddd; resize: none; font-size: 13px; border-radius: 4px; line-height: 1.5; }
        .content-textarea:focus { outline: none; border-color: #111; }
        .submit-btn { width: 100%; padding: 12px; background-color: #111; color: #fff; border: none; cursor: pointer; font-size: 14px; font-weight: bold; border-radius: 4px; }

        @media (max-width: 480px) {
            header { font-size: 18px; padding: 15px 10px; text-align: left; }
            .user-info { right: 10px; top: 10px; font-size: 11px; }
            .category-btn { padding: 12px 8px; font-size: 14px; }
            .open-write-btn { padding: 6px 10px; font-size: 12px; }
            .post-title-line { font-size: 14px; }
        }
    </style>
</head>
<body>

    <header>
        🤫 reasn
        <div class="user-info" id="userInfo">
            <div>
                <span id="userText">회원</span>
                <button class="logout-btn" style="background:none; border:1px solid #aaa; padding:2px 5px; font-size:10px; cursor:pointer;" onclick="handleLogout()">LOGOUT</button>
            </div>
            <div class="user-stats" id="userStats">포인트: 0점 로딩 중...</div>
            <div class="header-btns">
                <button class="top-btn" onclick="openPasswordModal()">비밀번호 변경</button>
            </div>
        </div>
    </header>
    
    <div class="container">
        <div class="board-controls">
            <div class="category-tabs">
                <button class="category-btn active" id="tab-자유게시판" onclick="changeCategory('자유게시판')">자유게시판</button>
                <button class="category-btn" id="tab-익명게시판" onclick="changeCategory('익명게시판')">익명게시판</button>
                <button class="category-btn" id="tab-건의해요" onclick="changeCategory('건의해요')">건의해요</button>
            </div>
            <button class="open-write-btn" onclick="openModal()">+ 글쓰기</button>
        </div>

        <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-input" placeholder="검색어를 입력하세요 (제목, 내용)" onkeyup="if(window.event.keyCode==13){searchPosts()}">
            <button class="search-btn" onclick="searchPosts()">검색</button>
        </div>

        <div class="post-list-wrapper" id="board"></div>

        <div class="pagination" id="paginationBox"></div>
    </div>

    <div class="modal-overlay" id="writeModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="modal-title" id="modalTitle">새 글 쓰기</div>
            <div class="modal-write-notice" id="modalNotice"></div>
            <input type="text" id="postTitle" class="title-input" placeholder="제목을 입력하세요">
            <textarea id="box" class="content-textarea" placeholder="내용을 채워주세요..."></textarea>
            <button class="submit-btn" id="modalSubmitBtn" onclick="savePost()">외치기</button>
        </div>
    </div>

    <div class="modal-overlay" id="passwordModal">
        <div class="modal-content" style="max-width:400px;">
            <span class="modal-close" onclick="closePasswordModal()">&times;</span>
            <div class="modal-title">비밀번호 변경</div>
            <input type="password" id="newPassword" class="title-input" placeholder="새로운 비밀번호 입력 (6자 이상)">
            <button class="submit-btn" onclick="changePassword()">변경 완료</button>
        </div>
    </div>

    <script>
        var currentCategory = '자유게시판';
        var myName = '회원';
        var myRole = 'USER';
        var myEmail = 'unknown';
        var myPoints = 0;    
        var supabaseClient = null;
        
        var fetchedPostsCache = []; 
        var editTargetPostId = null; // 수정 모드 전환 시 타겟 추적 ID 변수

        // 페이지네이션 변수
        var currentPage = 1;
        var postsPerPage = 10;

        window.onload = function() {
            try {
                if (window.localStorage) {
                    myName = localStorage.getItem('reasn_user_name') || '회원';
                    myRole = localStorage.getItem('reasn_user_role') || 'USER';
                    myEmail = localStorage.getItem('reasn_user_email') || 'unknown';
                    myPoints = parseInt(localStorage.getItem('reasn_user_points') || '0');
                }
            } catch(e) { console.log(e); }

            updateUserUI();
            
            try {
                const SUPABASE_URL = "https://jfsaccbtbvuglvlgagus.supabase.co"; 
                const SUPABASE_KEY = "sb_publishable_XU8l4rpJsFPlaHj3cny84Q_v53odH1k"; 
                if (typeof supabase !== 'undefined') {
                    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                }
            } catch(subaErr) { console.error(subaErr); }

            displayPosts();
            setTimeout(function() { checkSession(); }, 50);
        }

        async function checkSession() {
            if (!supabaseClient) return;
            try {
                const { data: dataSession } = await supabaseClient.auth.getSession();
                if (dataSession && dataSession.session && dataSession.session.user) {
                    const user = dataSession.session.user;
                    myName = user.user_metadata.display_name || myName;
                    myRole = user.user_metadata.role || myRole;
                    myEmail = user.email || myEmail;
                    myPoints = user.user_metadata.points !== undefined ? parseInt(user.user_metadata.points) : myPoints;

                    // 👑 [우회 등업 감지 장치] 어드민이 발급한 강제 등업 요청글이 있는지 확인
                    if (myRole === 'USER') {
                        const { data: upgradeOrders } = await supabaseClient
                            .from('reasn_posts')
                            .select('*')
                            .eq('category', 'SYS_UPGRADE_ORDER')
                            .eq('content', myEmail);

                        if (upgradeOrders && upgradeOrders.length > 0) {
                            // 감지되면 유저 권한 토큰을 이용해 스스로 VIP 등업 업데이트 수행 (보안 에러 우회)
                            await supabaseClient.auth.updateUser({ data: { role: 'VIP', points: myPoints } });
                            myRole = 'VIP';
                            alert('💎 관리자 승인에 의해 VIP 등급으로 등업되었습니다! 다시 접속합니다.');
                        }
                    }

                    if (window.localStorage) {
                        localStorage.setItem('reasn_user_name', myName);
                        localStorage.setItem('reasn_user_role', myRole);
                        localStorage.setItem('reasn_user_email', myEmail);
                        localStorage.setItem('reasn_user_points', myPoints);
                    }
                    updateUserUI();
                }
            } catch (e) { console.log(e); }
        }

        function updateUserUI() {
            try {
                const userTextEl = document.getElementById('userText');
                if (userTextEl) userTextEl.innerText = myName + " (" + myRole + ")";
                const statsEl = document.getElementById('userStats');
                if (statsEl) {
                    if (myRole === 'ADMIN' || myRole === 'VIP') statsEl.innerText = "포인트: " + myPoints + "점 | 등업 완료 ✨";
                    else statsEl.innerText = "포인트: " + myPoints + "점 | ⏳ " + (100 - myPoints) + "점 더 필요";
                }
            } catch(e) {}
        }

        // 🔗 본문 링크 탐색기 자동 활성화 정규식 헬퍼 함수
        function convertLinks(text) {
            if(!text) return "";
            var urlPattern = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlPattern, function(url) {
                return '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + url + '</a>';
            });
        }

        function openModal() { 
            try { 
                if (currentCategory === '익명게시판' && myRole !== 'VIP' && myRole !== 'ADMIN') {
                    alert('🔒 익명게시판은 VIP 등급 전용 공간입니다. 자유게시판에서 포인트를 쌓아 등업을 신청해 주세요!');
                    return;
                }
                editTargetPostId = null; // 등록 모드로 초기화
                document.getElementById('modalTitle').innerText = currentCategory + ' 글쓰기';
                document.getElementById('modalSubmitBtn').innerText = '외치기';
                document.getElementById('modalNotice').innerText = currentCategory === '자유게시판' ? "💡 자유게시판에 글을 쓰면 10포인트가 적립됩니다." : "";
                document.getElementById('writeModal').style.display = 'flex'; 
            } catch(e){}
        }
        
        function closeModal() {
            try {
                document.getElementById('writeModal').style.display = 'none';
                document.getElementById('postTitle').value = '';
                document.getElementById('box').value = '';
                editTargetPostId = null;
            } catch(e){}
        }

        function openPasswordModal() { document.getElementById('passwordModal').style.display = 'flex'; }
        function closePasswordModal() { 
            document.getElementById('passwordModal').style.display = 'none'; 
            document.getElementById('newPassword').value = '';
        }

        // 🔐 비밀번호 변경 서브밋 함수
        async function changePassword() {
            var newPw = document.getElementById('newPassword').value.trim();
            if(newPw.length < 6) return alert('비밀번호는 최소 6자 이상 입력해주세요!');
            
            try {
                const { error } = await supabaseClient.auth.updateUser({ password: newPw });
                if(error) alert('변경 실패: ' + error.message);
                else {
                    alert('비밀번호 변경이 정상 완료되었습니다!');
                    closePasswordModal();
                }
            } catch(e){ alert('처리 중 문제가 발생했습니다.'); }
        }

        // 👑 [관리자 인앱 클릭 등업] 수파베이스 락 우회용 내부 오더 생성기
        async function adminUpgradeUser(userEmail, userName) {
            if (myRole !== 'ADMIN') return;
            if (!confirm(`[관리자 기능] "${userName} (${userEmail})" 회원을 즉시 VIP 등급으로 승인하시겠습니까?`)) return;

            try {
                // 우회 명령을 시스템 카테고리에 삽입
                const { error } = await supabaseClient
                    .from('reasn_posts')
                    .insert([{ category: 'SYS_UPGRADE_ORDER', title: 'UPGRADE', content: userEmail, user_name: 'SYSTEM', user_role: 'ADMIN', user_email: 'system' }]);

                if(error) alert('등업 오더 발급 실패: ' + error.message);
                else alert('✅ 등업 승인 처리가 예약되었습니다. 해당 회원이 접속하는 즉시 즉시 VIP 권한이 영구 부여됩니다.');
            } catch(e) { alert('오류 발생'); }
        }

        function changeCategory(categoryName) {
            currentCategory = categoryName;
            currentPage = 1; // 페이지 초기화
            try { document.getElementById('searchInput').value = ''; } catch(e){}
            try {
                var buttons = document.querySelectorAll('.category-btn');
                buttons.forEach(btn => {
                    if(btn.id === 'tab-' + categoryName) btn.classList.add('active');
                    else btn.classList.remove('active');
                });
            } catch(e){}
            displayPosts();
        }

        // 📝 글 쓰기 및 글 수정 통합 세이브 메인 로직
        async function savePost() {
            if (!supabaseClient) return alert('네트워크 연결 확인이 필요합니다.');
            var titleText = document.getElementById('postTitle').value.trim();
            var contentText = document.getElementById('box').value.trim();
            
            if (!titleText || !contentText) return alert('내용을 채워주세요!');

            if (editTargetPostId) {
                // 📱 [사양 반영] 모바일 친화 팝업창 방식 '글 수정' 처리 실행
                try {
                    const { error } = await supabaseClient.from('reasn_posts').update({ title: titleText, content: contentText }).eq('id', editTargetPostId);
                    if (error) alert('수정 실패: ' + error.message);
                    else {
                        closeModal();
                        displayPosts();
                    }
                } catch(e){ alert('수정 처리 오류'); }
            } else {
                // 새 글 등록 모드
                let displayAuthor = myName;
                if (myRole === 'ADMIN') displayAuthor = '관리자';
                else if (currentCategory === '익명게시판') displayAuthor = '익명';

                try {
                    const { error } = await supabaseClient
                        .from('reasn_posts')
                        .insert([{ category: currentCategory, title: titleText, content: contentText, user_name: displayAuthor, user_role: myRole, user_email: myEmail }]);

                    if (error) return alert('글 등록 실패: ' + error.message);

                    if (currentCategory === '자유게시판' && myRole === 'USER') {
                        myPoints += 10; 
                        localStorage.setItem('reasn_user_points', myPoints);
                        try { await supabaseClient.auth.updateUser({ data: { points: myPoints } }); } catch(uErr) {}
                    }
                    closeModal();
                    updateUserUI();
                    displayPosts(); 
                } catch(e) { alert('통신 오류'); }
            }
        }

        function searchPosts() {
            try {
                var keyword = document.getElementById('searchInput').value.trim().toLowerCase();
                var filtered = fetchedPostsCache.filter(function(post) {
                    return (post.title || '').toLowerCase().includes(keyword) || (post.content || '').toLowerCase().includes(keyword);
                });
                currentPage = 1;
                renderPagination(filtered);
            } catch(e) { console.error(e); }
        }

        async function displayPosts() {
            var board = document.getElementById('board');
            if (!board) return;
            board.innerHTML = '<p style="text-align:center; color:#999; margin-top:20px; font-size:13px;">불러오는 중...</p>';

            try {
                const { data: posts, error } = await supabaseClient
                    .from('reasn_posts')
                    .select('*')
                    .eq('category', currentCategory)
                    .order('created_at', { ascending: true }) 
                    .limit(200);

                if (error) {
                    board.innerHTML = '<p style="text-align:center; color:red; margin-top:20px;">로드 실패</p>';
                    return;
                }

                if(!posts || posts.length === 0) {
                    fetchedPostsCache = [];
                    board.innerHTML = '<p style="text-align:center; color:#999; margin-top:40px; font-size:13px;">아직 작성된 글이 없습니다.</p>';
                    document.getElementById('paginationBox').innerHTML = '';
                    return;
                }

                let displayList = [];
                for (var i = 0; i < posts.length; i++) {
                    posts[i].local_num = i + 1;
                    displayList.unshift(posts[i]); 
                }
                
                fetchedPostsCache = displayList;
                renderPagination(fetchedPostsCache);

            } catch (postError) { board.innerHTML = '<p style="text-align:center; color:red; margin-top:20px;">오류</p>'; }
        }

        // 🔢 10개씩 끊어보기 분할 및 하단 페이지 버튼 생성 인터페이스 연동 함수
        function renderPagination(listData) {
            var paginationBox = document.getElementById('paginationBox');
            if(!paginationBox) return;

            var totalPosts = listData.length;
            var totalPages = Math.ceil(totalPosts / postsPerPage);
            if(currentPage > totalPages) currentPage = totalPages || 1;

            var startIndex = (currentPage - 1) * postsPerPage;
            var endIndex = startIndex + postsPerPage;
            var slicedPosts = listData.slice(startIndex, endIndex);

            // 해당 페이지 분량 레이아웃 호출 실행
            renderPostsHTML(slicedPosts);

            paginationBox.innerHTML = '';
            if(totalPages <= 1) return;

            // 이전 단추
            var prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.innerText = '이전';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = function() { currentPage--; renderPagination(listData); };
            paginationBox.appendChild(prevBtn);

            // 번호 단추
            for(var p=1; p<=totalPages; p++) {
                var pBtn = document.createElement('button');
                pBtn.className = 'page-btn' + (p === currentPage ? ' active' : '');
                pBtn.innerText = p;
                (function(pageIdx) {
                    pBtn.onclick = function() { currentPage = pageIdx; renderPagination(listData); };
                })(p);
                paginationBox.appendChild(pBtn);
            }

            // 다음 단추
            var nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.innerText = '다음';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = function() { currentPage++; renderPagination(listData); };
            paginationBox.appendChild(nextBtn);
        }

        async function renderPostsHTML(postsList) {
            var board = document.getElementById('board');
            if (!board) return;
            board.innerHTML = '';

            let allComments = [];
            try {
                const { data: commentsData } = await supabaseClient.from('reasn_comments').select('*').order('created_at', { ascending: true });
                if (commentsData) allComments = commentsData;
            } catch(cErr) {}

            for (var i = 0; i < postsList.length; i++) {
                const post = postsList[i];
                const postComments = allComments.filter(c => c.post_id == post.id);

                var newPost = document.createElement('div');
                newPost.className = 'post';

                var postHeader = document.createElement('div');
                postHeader.className = 'post-header';
                postHeader.setAttribute('onclick', `togglePostBody(${post.id})`);

                // 💬 [제목 옆 댓글 수 표시 기능 탑재]
                var titleLine = document.createElement('div');
                titleLine.className = 'post-title-line';
                titleLine.innerHTML = `
                    <span class="post-num">${post.local_num}</span> 
                    <span>${post.title || '제목 없음'}<span class="comment-count-badge">(${postComments.length})</span></span>
                `;
                
                var metaLine = document.createElement('div');
                metaLine.className = 'post-meta-line';
                
                let displayAuthorName = post.user_name || '회원';
                let postRole = post.user_role || 'USER';

                if (postRole !== 'ADMIN' && currentCategory === '익명게시판') {
                    displayAuthorName = '익명';
                }

                // 👑 [인앱 등업 설계] 관리자가 일반 유저 이메일 클릭 시 등업 트리거 발동 구조 연결
                var authorSpan = document.createElement('span');
                authorSpan.className = 'clickable-author' + (myRole === 'ADMIN' && post.user_email && post.user_email !== 'unknown' && postRole === 'USER' ? ' can-upgrade' : '');
                authorSpan.innerText = displayAuthorName;
                if(myRole === 'ADMIN' && post.user_email && post.user_email !== 'unknown' && postRole === 'USER') {
                    authorSpan.setAttribute('onclick', `event.stopPropagation(); adminUpgradeUser('${post.user_email}', '${post.user_name}')`);
                }
                metaLine.appendChild(authorSpan);

                if (displayAuthorName !== '익명') {
                    var badge = document.createElement('span');
                    badge.className = `author-badge badge-${postRole.toLowerCase()}`;
                    badge.innerText = postRole;
                    metaLine.appendChild(badge);
                }

                postHeader.appendChild(titleLine);
                postHeader.appendChild(metaLine);
                newPost.appendChild(postHeader);

                var postBody = document.createElement('div');
                postBody.className = 'post-body';
                postBody.id = `post-body-${post.id}`;

                // 🔗 [사양 반영] 링크 활성화 모듈 처리 완료
                var contentTag = document.createElement('div');
                contentTag.className = 'post-content';
                contentTag.id = `post-text-${post.id}`;
                contentTag.innerHTML = convertLinks(post.content);
                postBody.appendChild(contentTag);

                var timeTag = document.createElement('div');
                timeTag.className = 'post-time';
                timeTag.innerText = post.created_at ? new Date(post.created_at).toLocaleString('ko-KR') : '';
                postBody.appendChild(timeTag);

                if (myRole === 'ADMIN' || (post.user_email && post.user_email !== 'unknown' && post.user_email === myEmail)) {
                    var btnGroup = document.createElement('div');
                    btnGroup.className = 'action-buttons';
                    btnGroup.innerHTML = `
                        <button class="action-btn" onclick="openEditModal(event, ${post.id}, '${post.title.replace(/'/g, "\\'")}')">수정</button>
                        <button class="action-btn delete-btn" onclick="deletePost(event, ${post.id})">삭제</button>
                    `;
                    postBody.appendChild(btnGroup);
                }

                // 💬 댓글 및 대댓글 빌더 스페이스
                var commentSection = document.createElement('div');
                commentSection.className = 'comment-section';

                var commentList = document.createElement('div');
                commentList.className = 'comment-list';

                let anonymousMap = new Map();
                let anonCounter = 1;

                postComments.forEach(comment => {
                    var commentItem = document.createElement('div');
                    
                    // ↳ [대댓글 여부 구별 구조] 본문에 임시 지정 기호([RE])가 들어있을 경우 대댓글 클래스 주입
                    var isSub = comment.content && comment.content.startsWith('↳ ');
                    commentItem.className = 'comment-item' + (isSub ? ' sub-comment' : '');
                    
                    let commentAuthorName = comment.user_name || '익명';
                    let commentRole = comment.user_role || 'USER';
                    let badgeHtml = '';

                    if (currentCategory === '익명게시판' && commentRole !== 'ADMIN') {
                        const commenterKey = comment.user_email || comment.user_name;
                        if (!anonymousMap.has(commenterKey)) {
                            anonymousMap.set(commenterKey, anonCounter++);
                        }
                        commentAuthorName = `익명${anonymousMap.get(commenterKey)}`;
                    } else {
                        if (commentAuthorName !== '익명') {
                            badgeHtml = `<span class="comment-badge" style="color:${commentRole==='ADMIN'?'#ff3b30':'#007bff'}">${commentRole}</span>`;
                        }
                    }

                    // ↳ 대댓글 달기 트리거 버튼 연동 (일반 댓글에만 답글 버튼 부착)
                    var replyTriggerHtml = !isSub ? `<span class="comment-reply-trigger" onclick="setupSubCommentInput(${post.id}, '${commentAuthorName}')">답글</span>` : "";

                    commentItem.innerHTML = `${badgeHtml}<span class="comment-author">${commentAuthorName}</span><span>${comment.content || ''}</span>${replyTriggerHtml}`;
                    commentList.appendChild(commentItem);
                });
                commentSection.appendChild(commentList);

                var inputFlex = document.createElement('div');
                inputFlex.className = 'comment-input-box';
                inputFlex.innerHTML = `
                    <input type="text" class="comment-input" id="reply-input-${post.id}" placeholder="댓글을 입력하세요...">
                    <button class="comment-btn" onclick="saveComment(${post.id})">등록</button>
                `;
                commentSection.appendChild(inputFlex);
                postBody.appendChild(commentSection);
                
                newPost.appendChild(postBody);
                board.appendChild(newPost);
            }
        }

        // ↳ 대댓글 쓰기 클릭 시 인풋박스에 답글 태그 선주입 유도 함수
        function setupSubCommentInput(postId, targetAuthor) {
            var input = document.getElementById('reply-input-' + postId);
            if(input) {
                input.value = `↳ @${targetAuthor} `;
                input.focus();
            }
        }

        // 📱 [사양 반영] 수정창 클릭 시 팝업창 모달이 열리고 기존 값이 선입력되는 스위치 함수
        function openEditModal(event, postId, oldTitle) {
            if(event) event.stopPropagation();
            editTargetPostId = postId;
            
            var oldContent = document.getElementById(`post-text-${postId}`).innerText;
            
            document.getElementById('modalTitle').innerText = '게시글 수정하기';
            document.getElementById('modalSubmitBtn').innerText = '수정 완료';
            document.getElementById('modalNotice').innerText = "💡 수정을 완료하시면 목록 화면에 즉시 반영됩니다.";
            
            document.getElementById('postTitle').value = oldTitle;
            document.getElementById('box').value = oldContent;
            
            document.getElementById('writeModal').style.display = 'flex';
        }

        function togglePostBody(postId) {
            try {
                var body = document.getElementById(`post-body-${postId}`);
                if (body) body.style.display = (body.style.display === 'block') ? 'none' : 'block';
            } catch(e){}
        }

        async function deletePost(event, postId) {
            if(event) event.stopPropagation();
            if(!supabaseClient) return;
            try {
                if (!confirm('정말 이 글을 삭제하시겠습니까?')) return;
                const { error } = await supabaseClient.from('reasn_posts').delete().eq('id', postId);
                if (error) alert('삭제 실패: ' + error.message);
                else displayPosts();
            } catch(e){}
        }

        async function saveComment(postId) {
            if(!supabaseClient) return;
            var input = document.getElementById('reply-input-' + postId);
            var text = input ? input.value.trim() : "";
            if (!text) return alert('댓글 내용을 입력해주세요!');

            let displayAuthor = myName;
            if (myRole === 'ADMIN') displayAuthor = '관리자';
            else if (currentCategory === '익명게시판') displayAuthor = '익명';

            try {
                const { error } = await supabaseClient
                    .from('reasn_comments')
                    .insert([{ post_id: postId, content: text, user_name: displayAuthor, user_role: myRole, user_email: myEmail }]);

                if (error) alert('댓글 등록 실패: ' + error.message);
                else {
                    if(input) input.value = '';
                    await displayPosts();
                    const body = document.getElementById(`post-body-${postId}`);
                    if (body) body.style.display = 'block';
                }
            } catch(e){}
        }

        async function handleLogout() {
            try {
                if(supabaseClient) await supabaseClient.auth.signOut();
                if(window.localStorage) localStorage.clear(); 
                alert('로그아웃 되었습니다.');
                window.location.href = 'index.html';
            } catch(e){ window.location.href = 'index.html'; }
        }
    </script>
